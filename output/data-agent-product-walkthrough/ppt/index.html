  const STATIC_ATTRS = ['title', 'aria-label', 'placeholder', 'alt', 'data-color-label'];

  document.documentElement.setAttribute('lang', isEn ? 'en' : 'zh-CN');

  window.__pageTransitionColorDefaults = transitionColorDefaults;
  window.__pageTransitionColors = {};
  window.__setPageTransition = value => {
    window.__pageTransitionMode = window.__pageTransitionModes.includes(value) ? value : 'none';
  };
  window.__getPageTransition = () => window.__pageTransitionMode || 'none';
  window.__isPageTransitionColorMode = mode => Boolean(transitionColorDefaults[mode]);
  window.__setPageTransitionColor = (mode, value) => {
    if(!transitionColorDefaults[mode]) return;
    window.__pageTransitionColors[mode] = normalizeTransitionColor(value) || transitionColorDefaults[mode];
  };
  window.__getPageTransitionColor = mode => window.__pageTransitionColors[mode] || transitionColorDefaults[mode] || '#000000';
  function normalizeTransitionColor(value){
    return /^#[0-9a-f]{6}$/i.test(value || '') ? value.toLowerCase() : '';
  }
  function updateHint(){

  }
  addEventListener('DOMContentLoaded', updateHint, {once:true});

<script>
/* =============== Deck ViewModel Runtime =============== */
(function(){
  const vmEl = document.getElementById('deck-view-model');
  const textEl = document.getElementById('embedded-text-state');
  if(!vmEl) return;

  const STORE = 'dashi-ppt-view-model';
  const SERVER_SAVE_URL = '/api/save-deck-state';
  const SERVER_SAVE_DEBOUNCE_MS = 2000;
  const RESTORED_EMPHASIS_INDEX_KEYS = new Set(['activeIndex', 'currentIndex', 'emphasisIndex', 'featureIndex', 'focusCol', 'focusIndex', 'highlightCol', 'highlightIndex', 'highlightRowIndex']);
  const OMIT_AUTHORED_PROP = Symbol('omit-authored-prop');
  const PRIVATE_NESTED_PROP_KEYS = new Set([
    'tone', 'color', 'colors', 'palette', 'dark', 'light',
    'pos', 'position', 'x', 'y', 'top', 'right', 'bottom', 'left',
    'rotate', 'rotation', 'angle', 'z', 'zIndex',
  ]);
  const vm = readJson(vmEl, {});
  vm.state = vm.state || {};
  const embeddedText = readJson(textEl, {});
  const baseState = {
    slideOrder: [...(vm.state.slideOrder || (vm.slides || []).map(slide => slide.id))],
    skippedSlides: uniqueIds(vm.state.skippedSlides || []),
    deletedSlides: uniqueIds(vm.state.deletedSlides || []),
    duplicatedSlides: Array.isArray(vm.state.duplicatedSlides) ? [...vm.state.duplicatedSlides] : [],
    text: {...(vm.state.text || {}), ...embeddedText},
    props: {...(vm.state.props || {})},
  };
  // boot 恢复只有两层:HTML 内嵌基线(baseState)+ localStorage(仅签名匹配时生效)。
  // 不再有第三层 URL 编辑状态——分享链接式的编辑持久化已被自动保存(烧回 index.html 本体)取代。
  const deckSignature = createDeckSignature(vm, baseState.text);
  const saved = readSaved(deckSignature);
  if(saved.__draftInIdb) setTimeout(() => restoreDraftFromIdb(), 0);
  vm.state.slideOrder = saved.slideOrder || baseState.slideOrder;
  vm.state.skippedSlides = saved.skippedSlides || baseState.skippedSlides;
  vm.state.deletedSlides = saved.deletedSlides || baseState.deletedSlides;
  vm.state.duplicatedSlides = saved.duplicatedSlides || baseState.duplicatedSlides;
  vm.state.text = {...baseState.text, ...(saved.text || {})};
  vm.state.props = normalizeRestoredProps(mergePropsStates(baseState.props, saved.props));
  vm.state.__deckSignature = deckSignature;

  writeJson(textEl, vm.state.text);
  writeVm();

  window.__deckViewModel = {
    model: vm,
    getState,
    // 只读浅引用:getState 是全量深拷贝(含媒体 base64,可达数 MB),高频只读用 peek。
    peek(key){ return key == null ? vm.state : vm.state?.[key]; },
    setTextState,
    setSlideOrder,
    setSkippedSlides,
    setDeletedSlides,
    setProps,
    addDuplicatedSlide,
    restoreDuplicatedSlide,
    syncFromDom,
    write: writeVm,
    persist,
  };
  window.__getDeckViewModelState = getState;
  window.__syncDeckViewModelFromDom = syncFromDom;

  function getState(){
    return JSON.parse(JSON.stringify({
      ...(vm.state || {}),
      props: vm.state?.props || {},
    }));
  }


  function setTextState(text){
    vm.state.text = {...(text || {})};
    writeJson(textEl, vm.state.text);
    writeVm();
    persist();
  }

  function setSlideOrder(order){
    vm.state.slideOrder = [...(order || [])];
    writeVm();
    persist();
  }

  function setSkippedSlides(ids){
    vm.state.skippedSlides = uniqueIds(ids);
    writeVm();
    persist();
  }

  function setDeletedSlides(ids){
    vm.state.deletedSlides = uniqueIds(ids);
    writeVm();
    persist();
  }

  function setProps(slideId, props){
    if(!slideId) return;
    const authored = compactStatePropsFromRender(slideId, props || {});
    if(Object.keys(authored).length) vm.state.props[slideId] = authored;
    else delete vm.state.props[slideId];
    writeVm();
    persist();
  }

  function addDuplicatedSlide(record, sourceModel){
    const copyId = restoreDuplicatedSlide(record, sourceModel);
    const sourceId = record?.sourceId;
    if(!copyId || !sourceId) return;
    const order = [...(vm.state.slideOrder || [])].filter(id => id !== copyId);
    const sourceOrderIndex = order.indexOf(sourceId);
    order.splice(sourceOrderIndex >= 0 ? sourceOrderIndex + 1 : order.length, 0, copyId);
    vm.state.slideOrder = order;
    writeVm();
    persist();
  }

  function restoreDuplicatedSlide(record, sourceModel){
    const copyId = record?.copyId;
    const sourceId = record?.sourceId;
    if(!copyId || !sourceId) return '';
    vm.state.duplicatedSlides = (vm.state.duplicatedSlides || []).filter(item => item.copyId !== copyId);
    vm.state.duplicatedSlides.push({...record});
    const sourceIndex = (vm.slides || []).findIndex(slide => slide.id === sourceId);
    const source = sourceModel || (sourceIndex >= 0 ? vm.slides[sourceIndex] : null) || {};
    const modelSlide = {
      ...source,
      id:copyId,
      key:record.copyKey || copyId,
      dataLayout:source.dataLayout || source.layout || '',
      props:{...(source.props || {}), ...(record.props || {})},
    };
    if(!Array.isArray(vm.slides)) vm.slides = [];
    const existingIndex = vm.slides.findIndex(slide => slide.id === copyId);
    if(existingIndex >= 0) vm.slides.splice(existingIndex, 1);
    const insertAt = sourceIndex >= 0 ? sourceIndex + 1 : vm.slides.length;
    vm.slides.splice(insertAt, 0, modelSlide);
    writeVm();
    return copyId;
  }

  function syncFromDom(){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    setSlideOrder(slides.map((slide, index) => slide.dataset.vmSlideId || vm.slides?.[index]?.id || `slide-${index + 1}`));
    return getState();
  }

  function readSaved(signature){
    try {
      const saved = JSON.parse(localStorage.getItem(STORE) || '{}') || {};
      return saved.__deckSignature === signature ? saved : {};
    } catch {
      return {};
    }
  }

  // 大 state(用户传图后 props 里是 data: URL)会超出 localStorage 配额——溢出到
  // IndexedDB(容量以百 MB 计),localStorage 只留签名指针;readSaved 同步启动后由
  // restoreDraftFromIdb 异步补齐。预览服务在时 state 仍会烧回 index.html 本体,
  // 本地草稿只是无服务(静态服务器/file://)场景的兜底。
  const DRAFT_DB = 'dashi-deck-drafts';
  function idbDraft(mode, value){
    return new Promise(resolve => {
      try {
        const open = indexedDB.open(DRAFT_DB, 1);
        open.onupgradeneeded = () => open.result.createObjectStore('state');
        open.onerror = () => resolve(null);
        open.onsuccess = () => {
          const db = open.result;
          const tx = db.transaction('state', mode === 'get' ? 'readonly' : 'readwrite');
          const store = tx.objectStore('state');
          const req = mode === 'get' ? store.get(deckSignature) : store.put(value, deckSignature);
          req.onsuccess = () => { resolve(mode === 'get' ? req.result : true); db.close(); };
          req.onerror = () => { resolve(null); db.close(); };
        };
      } catch { resolve(null); }
    });
  }
  function persist(){
    vm.state.__deckSignature = deckSignature;
    try {
      localStorage.setItem(STORE, JSON.stringify(vm.state || {}));
    } catch (error) {
      // 配额超限:整份 state 进 IndexedDB,localStorage 留指针供 readSaved 感知。
      idbDraft('put', vm.state || {});
      try {
        localStorage.setItem(STORE, JSON.stringify({ __deckSignature: deckSignature, __draftInIdb: true }));
      } catch {}
    }
    scheduleServerSave();
  }
  async function restoreDraftFromIdb(){
    const draft = await idbDraft('get');
    if(!draft || draft.__deckSignature !== deckSignature) return;
    // 应用路径复用导出快照的共享实现(setText/setProps/文本 innerHTML/重渲染),
    // 该路径已被服务端与浏览器端导出双重验证。
    try {
      const script = document.createElement('script');
      await new Promise((resolve, reject) => {
        if(window.__editablePptxBrowser?.applyEditablePptxSnapshot) return resolve();
        script.src = 'assets/vendor/editable-pptx-browser.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('draft restore bundle failed'));
        document.head.appendChild(script);
      });
      const currentIndex = Math.max(0, (window.__getVisibleSlides?.() || []).findIndex(s => s.classList.contains('active')));
      await window.__editablePptxBrowser.applyEditablePptxSnapshot({ state: draft, currentIndex });
      writeJson(textEl, vm.state.text);
      writeVm();
    } catch (error) {
      console.warn('[deck draft] IndexedDB 草稿恢复失败', error);
    }
  }

  function writeVm(){
    writeJson(vmEl, vm);
  }

  // 预览服务下的自动保存:防抖 POST 把 state 烧回 index.html 本体(见 scripts/serve-preview-https.mjs
  // 的 /api/save-deck-state)。file:// 或没起预览服务时这次 fetch 天然失败——那就只退回 localStorage/
  // URL 状态兜底,并在“确有未落盘改动”时亮起低调的常驻提醒条(deckSaveDirty && serviceAvailable===false)。
  // serviceAvailable 初始为 null(未知):第一次保存结果出来之前不显示提醒,避免每次编辑都闪一下。
  let serverSaveTimer = null;
  let serverSaveInFlight = false;
  let serverSaveQueued = false;
  let deckSaveDirty = false;

  function deckAutosaveDisabled(){
    try {
      const options = JSON.parse(document.getElementById('preview-options')?.textContent || '{}');
      return options.autosave === false;
    } catch { return false; }
  }
  let serverSaveAvailable = null;

  function scheduleServerSave(){
    if(deckAutosaveDisabled()) return;
    deckSaveDirty = true;
    updateSaveStatusBanner();
    if(serverSaveTimer !== null) clearTimeout(serverSaveTimer);
    serverSaveTimer = setTimeout(runServerSave, SERVER_SAVE_DEBOUNCE_MS);
  }

  async function runServerSave(){
    serverSaveTimer = null;
    if(serverSaveInFlight){ serverSaveQueued = true; return; }
    serverSaveInFlight = true;
    let succeeded = false;
    try {
      const response = await fetch(SERVER_SAVE_URL, {
        method:'POST',
        headers:{'content-type':'application/json'},
        body:JSON.stringify({state:getState()}),
      });
      if(!response.ok) throw new Error(`save-deck-state responded ${response.status}`);
      const result = await response.json();
      serverSaveAvailable = true;
      if(result && result.mediaMap) applyMediaMapReconciliation(result.mediaMap);
      succeeded = true;
    } catch (error) {
      serverSaveAvailable = false;
    } finally {
      serverSaveInFlight = false;
      if(succeeded) deckSaveDirty = false;
      updateSaveStatusBanner();
      if(serverSaveQueued){
        serverSaveQueued = false;
        scheduleServerSave();
      }
    }
  }

  // 服务端把 data: 媒体落盘后,回传"原始 data: URL → 相对路径"的映射(mediaMap),而不是整份
  // state:这次 fetch 从发出到响应之间用户可能已经继续编辑(打了更多字、换了别的图),直接拿
  // 服务端回显的旧 state 整体覆盖当下 vm.state 会把这段等待期里的新编辑悄悄冲掉。所以这里只做
  // "精确字符串替换"——把当下(最新)vm.state.props 里仍然等于某个原始 data: URL 的位置换成
  // 对应相对路径,其余字段一律不碰;如果那个位置在等待期间已经被换成别的内容,替换会自然落空,
  // 留到下一次保存周期用新内容的 data: URL 再处理一遍。
  // 不调用 persist()/scheduleServerSave():这只是把服务端已确认落盘的结果同步回来,不是新的编辑。
  function applyMediaMapReconciliation(mediaMap){
    const entries = Object.entries(mediaMap || {});
    if(!entries.length) return;
    vm.state.props = replaceKnownDataUrls(vm.state.props, entries);
    writeVm();
    try {
      localStorage.setItem(STORE, JSON.stringify(vm.state || {}));
    } catch (error) {
      console.warn('[deck view model] reconciled state could not be persisted', error);
    }
  }

  function replaceKnownDataUrls(value, entries){
    if(Array.isArray(value)) return value.map(item => replaceKnownDataUrls(item, entries));
    if(value && typeof value === 'object'){
      const next = {};
      for(const [key, item] of Object.entries(value)) next[key] = replaceKnownDataUrls(item, entries);
      return next;
    }
    if(typeof value === 'string'){
      for(const [from, to] of entries){ if(value === from) return to; }
    }
    return value;
  }

  function updateSaveStatusBanner(){
    const el = document.getElementById('deck-save-status');
    if(!el) return;
    const show = deckSaveDirty && serverSaveAvailable === false;
    el.hidden = !show;
  }

  // 富文本可能被程序化写入 contenteditable(el.innerHTML = value),必须剥离脚本/事件处理器/
  // 危险元素才安全。用 <template> 解析(content 惰性,<img onerror>/<script> 不会执行),按白名单清洗。
  // 暴露为 window.__sanitizeRichText 供外部/测试直接调用。
  var SANITIZE_ALLOWED_TAGS = {B:1,STRONG:1,I:1,EM:1,BR:1,SUP:1,SUB:1};
  function sanitizeRichText(value){
    if (typeof value !== 'string' || value.indexOf('<') === -1) return value;
    var tpl = document.createElement('template');
    tpl.innerHTML = value;
    (function walk(node){
      var children = Array.prototype.slice.call(node.childNodes);
      for (var i=0;i<children.length;i++){
        var child = children[i];
        if (child.nodeType === 1){
          walk(child);
          if (SANITIZE_ALLOWED_TAGS[child.tagName]){
            while (child.attributes.length) child.removeAttribute(child.attributes[0].name);
          } else if (child.tagName === 'SCRIPT' || child.tagName === 'STYLE') {
            child.remove();
          } else {
            child.replaceWith.apply(child, Array.prototype.slice.call(child.childNodes));
          }
        } else if (child.nodeType !== 3) {
          child.remove();
        }
      }
    })(tpl.content);
    return tpl.innerHTML;
  }
  if (typeof window !== 'undefined') window.__sanitizeRichText = sanitizeRichText;

  function compactStatePropsFromRender(slideId, renderProps){
    const defaults = getComponentDefaultSlideProps(slideId);
    const source = getSlideSourceProps(slideId);
    const authored = compactAuthoredPropValue(renderProps || {}, defaults, source, '');
    if(!authored || typeof authored !== 'object' || Array.isArray(authored)) return {};
    return diffAuthoredRootForState(authored, source);
  }

  function compactAuthoredPropValue(current, defaults, source, path){
    if(Array.isArray(current)){
      const items = current.map((item, index) => compactAuthoredPropValue(
        item,
        Array.isArray(defaults) ? defaults[index] : undefined,
        Array.isArray(source) ? source[index] : undefined,
        `${path}[]`,
      ));
      let end = items.length;
      while(end > 0 && isOmittedAuthoredProp(items[end - 1])) end -= 1;
      if(end === 0 && !Array.isArray(source)) return OMIT_AUTHORED_PROP;
      return items.slice(0, end).map(item => isOmittedAuthoredProp(item) ? {} : item);
    }
    if(current && typeof current === 'object'){
      const out = {};
      Object.entries(current).forEach(([key, value]) => {
        if(path && isPrivateNestedPropKey(key)) return;
        const child = compactAuthoredPropValue(
          value,
          defaults && typeof defaults === 'object' ? defaults[key] : undefined,
          source && typeof source === 'object' ? source[key] : undefined,
          path ? `${path}.${key}` : key,
        );
        if(!isOmittedAuthoredProp(child)) out[key] = child;
      });
      if(Object.keys(out).length) return out;
      return source && typeof source === 'object' ? out : OMIT_AUTHORED_PROP;
    }
    const hasSource = source !== undefined;
    if(hasSource || JSON.stringify(current) !== JSON.stringify(defaults)) return current;
    return OMIT_AUTHORED_PROP;
  }

  function diffAuthoredRootForState(authored, source){
    const out = {};
    Object.entries(authored || {}).forEach(([key, value]) => {
      if(JSON.stringify(value) !== JSON.stringify(source?.[key])) out[key] = value;
    });
    return out;
  }

  function isOmittedAuthoredProp(value){
    return value === OMIT_AUTHORED_PROP;
  }

  function isPrivateNestedPropKey(key){
    return PRIVATE_NESTED_PROP_KEYS.has(String(key || ''));
  }

  function getComponentDefaultSlideProps(slideId){
    const slideEl = [...document.querySelectorAll('#deck > .slide')].find(slide => slide.dataset.vmSlideId === slideId);
    return readDatasetJson(slideEl?.querySelector('[data-prop-controls]')?.dataset.propDefaults, {});
  }

  function getSlideSourceProps(slideId){
    return (vm.slides || []).find(slide => slide.id === slideId)?.props || {};
  }

  function getDefaultSlideProps(slideId){
    const source = getSlideSourceProps(slideId);
    const defaults = getComponentDefaultSlideProps(slideId);
    return {...defaults, ...source, ...(baseState.props?.[slideId] || {})};
  }

  function mergePropsStates(...states){
    const out = {};
    states.forEach(state => {
      Object.entries(state || {}).forEach(([slideId, values]) => {
        out[slideId] = {...(out[slideId] || {}), ...(values || {})};
      });
    });
    return out;
  }

  function normalizeRestoredProps(props){
    const out = {};
    Object.entries(props || {}).forEach(([slideId, rawValues]) => {
      const normalized = normalizeRestoredSlideProps(slideId, rawValues);
      if(normalized && Object.keys(normalized).length) out[slideId] = normalized;
    });
    return out;
  }

  // 防御性钳制:localStorage 里保存的 range 类 prop 可能带着旧版本写入的越界值
  // (例如联动 count 收窄后残留的旧 index),启动时按当前控件边界夹回合法范围。
  function normalizeRestoredSlideProps(slideId, rawValues){
    if(!rawValues || typeof rawValues !== 'object' || Array.isArray(rawValues)) return {};
    const controls = getSlidePropControls(slideId);
    if(!controls.length) return {...rawValues};
    const defaults = getDefaultSlideProps(slideId);
    const values = {...defaults, ...rawValues};
    controls.forEach(control => {
      const type = normalizeRestoredControlType(control?.type);
      if(type !== 'range' || !hasOwn(rawValues, control.key)) return;
      const bounds = resolveRestoredRangeBounds(control, values);
      const current = Number(values[control.key]);
      if(!Number.isFinite(current)) return;
      values[control.key] = Math.min(bounds.max, Math.max(bounds.min, current));
    });
    return compactStatePropsFromRender(slideId, values);
  }

  function resolveRestoredRangeBounds(control, values){
    const min = Number(control.min ?? 0);
    let max = Number(control.max ?? 10);
    if(control.maxFromKey && RESTORED_EMPHASIS_INDEX_KEYS.has(control.key)){
      const linkedValue = Number(values?.[control.maxFromKey]);
      if(Number.isFinite(linkedValue)) {
        const explicitOffset = Number(control?.maxFromKeyOffset);
        const offset = Number.isFinite(explicitOffset) ? explicitOffset : (min === 0 ? -1 : 0);
        max = Math.min(max, Math.max(min, linkedValue + offset));
      }
    }
    if(max < min) max = min;
    return {min, max};
  }

  function normalizeRestoredControlType(type){
    if(['slider', 'range', 'number'].includes(type)) return 'range';
    return type || 'range';
  }

  function getSlidePropControls(slideId){
    const slideEl = [...document.querySelectorAll('#deck > .slide')].find(slide => slide.dataset.vmSlideId === slideId);
    return readDatasetJson(slideEl?.querySelector('[data-prop-controls]')?.dataset.propControls, []);
  }

  function hasOwn(object, key){
    return Object.prototype.hasOwnProperty.call(object || {}, key);
  }

  function readDatasetJson(value, fallback){
    try {
      return JSON.parse(value || '') || fallback;
    } catch {
      return fallback;
    }
  }

  function uniqueIds(ids){
    return [...new Set((ids || []).filter(Boolean).map(String))];
  }

  function readJson(el, fallback){
    if(!el) return fallback;
    try {
      return JSON.parse(el.textContent || '') || fallback;
    } catch {
      return fallback;
    }
  }

  function writeJson(el, data){
    if(el) el.textContent = JSON.stringify(data || {}).replace(/</g, '\\u003c');
  }

  function createDeckSignature(model, text){
    const payload = JSON.stringify({
      title: model.title,
      exportId: model.exportId || '',
      slides: (model.slides || []).map(slide => [slide.id, slide.key, slide.layout, slide.dataLayout, slide.props]),
      text,
    });
    let hash = 0;
    for(let i = 0; i < payload.length; i += 1){
      hash = ((hash << 5) - hash + payload.charCodeAt(i)) | 0;
    }
    return String(hash);
  }
})();

</script>
<script>
/* =============== 导航 =============== */
const deck=document.getElementById('deck');
const deckViewport=document.getElementById('deck-viewport');
const slideRail=document.getElementById('slide-rail');
const deckTopbar=document.getElementById('deck-topbar');
const slideRailList=document.getElementById('slide-rail-list');
const slideRailCount=document.getElementById('slide-rail-count');
const slideRailResizeHandle=document.querySelector('[data-rail-resize-handle="true"]');
const previewPanelResizeHandle=document.querySelector('[data-panel-resize-handle="true"]');
const deckPageCount=document.getElementById('deck-page-count');
const deckPagePrev=document.getElementById('deck-page-prev');
const deckPageNext=document.getElementById('deck-page-next');
function collectDeckSlides(root=deck){
  return [...(root?.children || [])].filter(el => el.classList?.contains('slide'));
}
let allSlides=collectDeckSlides();
let slides=[...allSlides];
const nav=document.getElementById('nav');
let idx=0,total=0,lock=false;
let pendingNavigationDirection=0;
let deckW=innerWidth;
let deckH=innerHeight;
let deckLeft=0;
let deckTop=0;
let deckScale=1;
let activeThemePack=document.documentElement.dataset.themePack || '';
// 轻量视图定位:?page=<1-based>&pack=<themePack>,仅影响初始导航,翻页/切包时用 replaceState
// 防抖回写(见 scheduleViewParamsWrite)。不进入 vm.state / localStorage / 自动保存链路。
const baseThemePackForViewParams=activeThemePack;
const VIEW_PARAM_PAGE='page';
const VIEW_PARAM_PACK='pack';
const VIEW_PARAM_WRITE_DEBOUNCE_MS=260;
let viewParamsWriteTimer=null;
function scheduleViewParamsWrite(){
  if(viewParamsWriteTimer !== null) clearTimeout(viewParamsWriteTimer);
  viewParamsWriteTimer=setTimeout(() => {
    viewParamsWriteTimer=null;
    writeViewParamsNow();
  }, VIEW_PARAM_WRITE_DEBOUNCE_MS);
}
function writeViewParamsNow(){
  if(viewParamsWriteTimer !== null){
    clearTimeout(viewParamsWriteTimer);
    viewParamsWriteTimer=null;
  }
  try {
    const next=new URL(location.href);
    if(idx > 0) next.searchParams.set(VIEW_PARAM_PAGE, String(idx + 1));
    else next.searchParams.delete(VIEW_PARAM_PAGE);
    if(activeThemePack && activeThemePack !== baseThemePackForViewParams) next.searchParams.set(VIEW_PARAM_PACK, activeThemePack);
    else next.searchParams.delete(VIEW_PARAM_PACK);
    if(next.href === location.href) return;
    history.replaceState(history.state, document.title, next.href);
  } catch {
    // 静默失败:轻量视图定位不能影响翻页/切包本身。
  }
}

const DECK_ASPECT_W=16;
const DECK_ASPECT_H=9;

if(deckMode === 'edit' && !document.body.classList.contains('editor-panels-collapsed')){

function isPresentMode(){

function setDeckMode(mode){
  const next = mode === 'present' ? 'present' : 'edit';
  if(deckMode === next) return;
  deckMode = next;
  document.body.dataset.mode = deckMode;
  if(isPresentMode()){
    slideRail && (slideRail.inert = true);
    document.getElementById('preview-panel') && (document.getElementById('preview-panel').inert = true);
    if(typeof hideRailContextMenu === 'function') hideRailContextMenu();
    if(typeof pauseOverviewThumbs === 'function') pauseOverviewThumbs();
    if(typeof requestOverviewClosedPrewarm === 'function') requestOverviewClosedPrewarm(700);
    window.__setEditableTextMode?.(false);
  }else{
    const panelsCollapsed = document.body.classList.contains('editor-panels-collapsed');
    slideRail && (slideRail.inert = panelsCollapsed);
    document.getElementById('preview-panel') && (document.getElementById('preview-panel').inert = panelsCollapsed);
    window.__setEditableTextMode?.(true);
    if(typeof refreshRailCatalog === 'function') refreshRailCatalog();
    if(typeof scrollOverviewToCurrent === 'function') scrollOverviewToCurrent();

}

async function enterPresentMode(){
  if(document.fullscreenElement){
    setDeckMode('present');
    return;
  }
  const root = document.documentElement;
  if(!root?.requestFullscreen) return;
  try {
    await root.requestFullscreen({navigationUI:'hide'});
    setDeckMode('present');
  } catch (error) {
    console.warn('[present fullscreen]', error);
  }
}
window.__enterPresentMode = enterPresentMode;

function exitPresentMode(){
  if(document.fullscreenElement){
    document.exitFullscreen?.().catch(error => console.warn('[present fullscreen exit]', error));
    return;
  }
  setDeckMode('edit');
}
window.__exitPresentMode = exitPresentMode;

document.addEventListener('keydown', event => {
  if(event.key !== 'Escape' || !isPresentMode()) return;
  if(document.fullscreenElement){
    document.exitFullscreen?.().catch(error => console.warn('[present fullscreen escape]', error));
    return;
  }
  exitPresentMode();
}, true);

document.addEventListener('fullscreenchange', () => {

function getDeckPageNumberForSlide(slide){
  if(!slide) return null;
  const visible = slides && slides.length ? slides : [...document.querySelectorAll('#deck > .slide:not([hidden])')];
  const index = visible.indexOf(slide);
  if(index < 0) return null;
  return {
    current:index + 1,
    total:visible.length,
  };
}
window.__getDeckPageNumberForSlide = getDeckPageNumberForSlide;

function formatDeckPageNumber(value, pad=2){
  const number = Number(value);
  const text = Number.isFinite(number) ? String(Math.max(0, Math.trunc(number))) : String(value || '');
  return text.padStart(Math.max(0, Number(pad) || 0), '0');
}

function syncDeckPageNumbers(scope=document){
  const roots = [];
  if(scope instanceof Element && scope.classList.contains('slide')) roots.push(scope);
  else if(scope instanceof Element) roots.push(...scope.querySelectorAll('.slide'));
  else roots.push(...(slides || []));
  const seen = new Set();
  roots.forEach(slide => {
    if(!slide || seen.has(slide)) return;
    seen.add(slide);
    const state = getDeckPageNumberForSlide(slide);
    if(!state) return;
    slide.dataset.dashiPageCurrent = String(state.current);
    slide.dataset.dashiPageTotal = String(state.total);
    const signature = `${state.current}/${state.total}`;
    if(slide.dataset.dashiPageNumberSignature && slide.dataset.dashiPageNumberSignature !== signature){
      bumpOverviewThumbRevision(slide);
    }
    slide.dataset.dashiPageNumberSignature = signature;
    slide.querySelectorAll('[data-dashi-page-number]').forEach(slot => {
      syncDeckPageNumberSlot(slot, state);
    });
    slide.querySelectorAll('[data-dashi-page-progress]').forEach(el => {
      const pct = state.total > 0 ? Math.max(0, Math.min(100, Math.round((state.current / state.total) * 100))) : 0;
      el.style.width = pct + '%';
    });
  });
}
window.__syncDeckPageNumbers = syncDeckPageNumbers;

function syncDeckPageNumberSlot(slot, state){
  const pad = Number(slot.dataset.dashiPagePad || 2);
  const totalPad = Number(slot.dataset.dashiPageTotalPad || 2);
  const separator = slot.dataset.dashiPageSeparator || ' / ';
  const currentText = formatDeckPageNumber(state.current, pad);
  const totalText = formatDeckPageNumber(state.total, totalPad);
  const currentEl = slot.querySelector('[data-dashi-page-current]');
  const totalEl = slot.querySelector('[data-dashi-page-total]');
  const separatorEl = slot.querySelector('[data-dashi-page-separator]');
  if(currentEl) currentEl.textContent = currentText;
  if(totalEl) totalEl.textContent = totalText;
  if(separatorEl) separatorEl.textContent = separator;
  if(!currentEl && !totalEl){
    slot.textContent = slot.dataset.dashiPageNumber === 'current'
      ? currentText
      : `${currentText}${separator}${totalText}`;
  }
}

function getSlideVmId(slide, index){
  // indexOf 是 O(N),必须惰性:正常页都有 vmSlideId,不该为它付全表扫描(1020 卡遍历时会是 O(N²))。
  return slide?.dataset?.vmSlideId || slide?.id || slide?.dataset?.layout
    || `slide-${Math.max(0, index ?? allSlides.indexOf(slide)) + 1}`;
}

let svgCloneIdCounter = 0;
function uniquifySvgCloneIds(root, label='clone'){
  if(!root?.querySelectorAll) return root;
  const idNodes = [...root.querySelectorAll('svg [id]')];
  if(root.matches?.('svg [id]')) idNodes.unshift(root);
  if(!idNodes.length) return root;
  const suffix = `${label}-${Date.now().toString(36)}-${(svgCloneIdCounter++).toString(36)}`;
  const idMap = new Map();
  idNodes.forEach((node, index) => {
    const id = node.id;
    if(!id || idMap.has(id)) return;
    const next = `${id}__${suffix}-${index}`;
    idMap.set(id, next);
    node.id = next;
  });
  if(!idMap.size) return root;
  const rewriteSvgUrlRefs = value => String(value || '').replace(/url\((["']?)#([^"')]+)\1\)/g, (match, quote, id) => {
    const mapped = idMap.get(id);
    return mapped ? `url(${quote}#${mapped}${quote})` : match;
  });
  const refNodes = [root, ...root.querySelectorAll('*')];
  refNodes.forEach(node => {
    if(!node.attributes) return;
    [...node.attributes].forEach(attr => {
      let value = attr.value;
      if(!value) return;
      let next = rewriteSvgUrlRefs(value);
      if((attr.name === 'href' || attr.name === 'xlink:href') && next.startsWith('#')){
        const mapped = idMap.get(next.slice(1));
        if(mapped) next = `#${mapped}`;
      }
      if(next !== value) node.setAttribute(attr.name, next);
    });
  });
  root.querySelectorAll?.('style').forEach(node => {
    const value = node.textContent || '';
    const next = rewriteSvgUrlRefs(value);
    if(next !== value) node.textContent = next;
  });
  return root;
}

function releaseTemplateVideoElements(root){
  const videos = [];
  const visit = node => {
    if(!node) return;
    if(node.matches?.('video')) videos.push(node);
    node.querySelectorAll?.('video')?.forEach(video => videos.push(video));
    node.querySelectorAll?.('*')?.forEach(el => {
      if(el.shadowRoot) visit(el.shadowRoot);
    });
  };
  visit(root);
  videos.forEach(video => {
    video.pause?.();
    if(video.getAttribute?.('src')) video.removeAttribute('src');
    video.querySelectorAll?.('source[src]')?.forEach(source => source.removeAttribute('src'));
    video.load?.();
  });
}

function isDuplicatedRuntimeSlide(slide){
  const id = getSlideVmId(slide);
  return slide?.dataset?.duplicatedSlide === 'true' || /__copy_/.test(id || '');
}

function uniquifyDuplicatedRuntimeSlideSvgIds(slide){
  if(!isDuplicatedRuntimeSlide(slide)) return slide;
  return uniquifySvgCloneIds(slide, 'duplicated-slide-rendered');
}

function restorePersistedCatalogSlides(){
  const state = window.__deckViewModel?.getState?.() || {};
  const records = Array.isArray(state.duplicatedSlides) ? state.duplicatedSlides : [];
  if(!records.length) return;
  const slideById = new Map(collectDeckSlides().map((slide, index) => [getSlideVmId(slide, index), slide]));
  records.forEach(record => {
    if(!record?.sourceId || !record?.copyId || slideById.has(record.copyId)) return;
    const source = slideById.get(record.sourceId);
    if(!source) return;
    const clone = source.cloneNode(true);
    releaseTemplateVideoElements(clone);
    uniquifySvgCloneIds(clone, 'duplicated-slide');
    prepareDuplicatedSlideClone(clone, source, record.copyId);
    deck.insertBefore(clone, source.nextSibling);
    slideById.set(record.copyId, clone);
    const sourceModel = window.__deckViewModel?.model?.slides?.find(item => item.id === record.sourceId);
    window.__deckViewModel?.restoreDuplicatedSlide?.(record, sourceModel);
  });
}
window.__restorePersistedCatalogSlides = restorePersistedCatalogSlides;

function applyPersistedSlideOrder(){
  const order = window.__deckViewModel?.getState?.().slideOrder || [];
  if(!order.length) return;
  const current = collectDeckSlides();
  const slideById = new Map(current.map((slide, index) => [getSlideVmId(slide, index), slide]));
  order.forEach(id => {
    const slide = slideById.get(id);
    if(slide) deck.appendChild(slide);
  });
}

const slideStateSetCache = new Map();
function getSlideStateSet(key){
  const vmApi = window.__deckViewModel;
  const source = vmApi?.peek ? vmApi.peek(key) : vmApi?.getState?.()?.[key];
  const list = Array.isArray(source) ? source : [];
  const cached = slideStateSetCache.get(key);
  if(cached && cached.source === source) return cached.set;
  const set = new Set(list.filter(Boolean).map(String));
  slideStateSetCache.set(key, { source, set });
  return set;
}

function isSlideHiddenByThemePack(slide){
  return !!(activeThemePack && slide?.dataset.themePack && slide.dataset.themePack !== activeThemePack);
}

function isSlideDeleted(slide, index=allSlides.indexOf(slide)){
  return getSlideStateSet('deletedSlides').has(getSlideVmId(slide, index));
}

function isSlideSkipped(slide, index=allSlides.indexOf(slide)){
  return getSlideStateSet('skippedSlides').has(getSlideVmId(slide, index));
}

function getCatalogSlides(){
  allSlides=collectDeckSlides();
  const deleted = getSlideStateSet('deletedSlides');
  return allSlides.filter((slide, index) => !isSlideHiddenByThemePack(slide) && !deleted.has(getSlideVmId(slide, index)));
}

function persistCatalogSlideOrder(){
  window.__deckViewModel?.setSlideOrder?.(getCatalogSlides().map((slide, index) => getSlideVmId(slide, index)));
}

function refreshSlideList(){
  allSlides=collectDeckSlides();
  const skipped = getSlideStateSet('skippedSlides');
  const deleted = getSlideStateSet('deletedSlides');
  allSlides.forEach((slide, index) => {
    const slideId = getSlideVmId(slide, index);
    const hiddenByPack = isSlideHiddenByThemePack(slide);
    const hiddenByState = deleted.has(slideId) || skipped.has(slideId);
    const hidden = hiddenByPack || hiddenByState;
    slide.hidden = hidden;
    if(skipped.has(slideId)) slide.dataset.slideSkipped = 'true';
    else delete slide.dataset.slideSkipped;
    if(hidden) slide.setAttribute('aria-hidden', 'true');
    else slide.removeAttribute('aria-hidden');
  });
  slides=allSlides.filter(slide => !slide.hidden);
  total=slides.length;
  if(total === 0) idx=0;
  if(idx >= total) idx=Math.max(0,total-1);
  syncDeckPageNumbers();
}

function parseRuntimeSlidePage(layout){
  const match = String(layout || '').match(/^(theme\d+)_page(\d+)$/i);
  return match ? Number(match[2]) : null;
}

function getRuntimeSlideErrorMeta(slide){
  const root = slide?.querySelector?.('.imported-theme-root');
  const layout = slide?.dataset?.vmLayout || root?.dataset?.pageKey || '';
  const index = Number(slide?.dataset?.vmIndex);
  return {
    theme: slide?.dataset?.themePack || root?.dataset?.themeKey || activeThemePack || document.documentElement.dataset.themePack || 'unknown',
    page: parseRuntimeSlidePage(layout) ?? (Number.isFinite(index) ? index + 1 : null),
    layout: layout || 'unknown',
    dataLayout: slide?.dataset?.layout || '',
    slideId: slide?.dataset?.vmSlideId || '',
  };
}

function reportRuntimeSlideError(context, slide, error){
  const meta = getRuntimeSlideErrorMeta(slide);
  const message = error?.message || String(error || 'runtime render failed');
  const detail = {...meta, context, message};
  window.__deckRuntimeErrors = window.__deckRuntimeErrors || [];
  window.__deckRuntimeErrors.push(detail);
  console.error(`[${context}] theme=${meta.theme} page=${meta.page == null ? 'unknown' : String(meta.page).padStart(3, '0')} layout=${meta.layout} ${message}`, error);
  dispatchEvent(new CustomEvent('deck-runtime-error', {detail}));
}

function isRuntimeThemeSlide(slide){
  return !!slide?.querySelector?.('.imported-theme-root');
}

function showRuntimeSlideErrorPlaceholder(slide, error){
  if(!slide) return;
  let overlay = slide.querySelector(':scope > [data-runtime-error-overlay]');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.setAttribute('data-runtime-error-overlay', 'true');
    overlay.style.cssText = 'position:absolute;inset:0;z-index:80;display:flex;flex-direction:column;'
      + 'align-items:center;justify-content:center;gap:10px;padding:48px;text-align:center;'
      + 'background:rgba(17,17,20,0.94);color:#fff;font:600 22px/1.4 var(--sans,sans-serif);pointer-events:none;';
    const title = document.createElement('div');
    title.textContent = window.__deckI18n.ui('该页渲染失败，内容已跳过');
    const detail = document.createElement('div');
    detail.style.cssText = 'font-weight:400;font-size:14px;opacity:.7;max-width:82%;word-break:break-word;';
    overlay.append(title, detail);
    slide.appendChild(overlay);
  }
  const detailEl = overlay.lastElementChild;
  if(detailEl) detailEl.textContent = error?.message ? String(error.message).slice(0, 240) : '';
}

function clearRuntimeSlideErrorPlaceholder(slide){
  slide?.querySelector?.(':scope > [data-runtime-error-overlay]')?.remove();
}

// isolated:true 的调用方(如 go()/commitSlideIndex)在这次调用之后还有收尾代码要跑(释放
// 导航锁等)——异常在这里必须被兜住,不能冲断收尾代码。非 isolated 调用方(如 overview 缩略图
// 生成管线的 renderOverviewThumb)自己有更专用的外层 try/catch 和恢复 UI,这里必须让异常正常
// 往外传,不能抢先吞掉,否则外层那套上下文更准确的错误处理和占位 UI 就都不会触发了。
function renderRuntimeSlideWithIsolation(slide, props, opts={}){
  if(!opts.isolated){
    const rendered = !!window.__renderRuntimeSlide?.(slide, props);
    delete slide.dataset.runtimeRenderError;
    clearRuntimeSlideErrorPlaceholder(slide);
    return rendered;
  }
  let rendered = false;
  let thrown = null;
  try{
    rendered = !!window.__renderRuntimeSlide?.(slide, props);
  }catch(error){
    thrown = error;
  }
  if(rendered){
    delete slide.dataset.runtimeRenderError;
    clearRuntimeSlideErrorPlaceholder(slide);
    return true;
  }
  if(thrown) reportRuntimeSlideError(opts.context || 'runtime isolated render', slide, thrown);
  if(isRuntimeThemeSlide(slide)){
    slide.dataset.runtimeRenderError = 'true';
    showRuntimeSlideErrorPlaceholder(slide, thrown);
  }
  return false;
}

function ensureRuntimeSlideRendered(slide, values, opts={}){
  if(!slide) return false;
  const slideId = slide.dataset.vmSlideId;
  const sourceProps = window.__deckViewModel?.model?.slides?.find(item => item.id === slideId)?.props || {};
  const savedProps = window.__deckViewModel?.getState?.().props?.[slideId] || {};
  const next = {...sourceProps, ...savedProps, ...(values || {})};
  const rendered = renderRuntimeSlideWithIsolation(slide, next, opts);
  if(rendered){
    window.__initEditableText?.(slide);
    uniquifyDuplicatedRuntimeSlideSvgIds(slide);
  }
  return rendered;
}
window.__ensureRuntimeSlideRendered = ensureRuntimeSlideRendered;

function prepareSlideForTransition(slide, values, opts={}){
  if(!slide) return false;
  const rendered = ensureRuntimeSlideRendered(slide, values, opts);
  if(opts.isolated && slide.dataset.runtimeRenderError === 'true') return false;
  window.__restoreEffectIframes?.(slide);
  slide.dataset.transitionReady = 'true';
  return rendered || !!slide.firstElementChild;
}
window.__prepareSlideForTransition = prepareSlideForTransition;

function startTransitionSlideEnter(slide){
  if(!slide) return false;
  window.__transitionEnteredSlide = slide;
  slide.dataset.transitionEnterStarted = 'true';
  slide.setAttribute('data-deck-active', '');
  window.__restoreEffectIframes?.(slide);
  window.__syncActiveEffects?.(slide);
  return true;
}
window.__startTransitionSlideEnter = startTransitionSlideEnter;

function preloadAdjacentSlides(activeIndex=idx, opts={}){
  if(deckDiagnosticFlags.disableAdjacentPreload) return;
  const targets = [activeIndex + 1, activeIndex - 1]
    .filter(index => index >= 0 && index < slides.length)
    .map(index => slides[index])
    .filter(Boolean);
  if(!targets.length) return;
  const run = () => {
    applyAdjacentVisibility(activeIndex);
    targets.forEach(slide => prepareSlideForTransition(slide, undefined, {
      isolated:true,
      context:'adjacent preload',
    }));
    window.__releaseInactiveRuntimeSlides?.(slides[activeIndex], {adjacentPreload:true});
  };
  if(opts.immediate){
    run();
    return;
  }
  const delay = Number(opts.delay || 0);
  if(delay > 0){
    if(adjacentPreloadTimer !== null) clearTimeout(adjacentPreloadTimer);
    adjacentPreloadTimer = setTimeout(() => {
      adjacentPreloadTimer=null;
      if(activeIndex === idx) preloadAdjacentSlides(activeIndex);
    }, delay);
    return;
  }
  if('requestIdleCallback' in window) requestIdleCallback(run, {timeout: 260});
  else setTimeout(run, 60);
}
window.__preloadAdjacentSlides = preloadAdjacentSlides;

// Keep the active slide's immediate neighbors painted (content-visibility:visible)
// so adjacent navigation never flashes a blank/un-rendered frame.
function applyAdjacentVisibility(activeIndex=idx){
  const near = new Set();
  [activeIndex - 1, activeIndex + 1].forEach(index => {
    if(index >= 0 && index < slides.length && slides[index]) near.add(slides[index]);
  });
  allSlides.forEach(slide => slide.classList.toggle('cv-near', near.has(slide)));
}

function setActiveThemePack(themePack, opts={}){
  activeThemePack=themePack || '';
  if(activeThemePack) document.documentElement.dataset.themePack=activeThemePack;
  else document.documentElement.removeAttribute('data-theme-pack');
  refreshSlideList();
  renderNav();
  layoutDeck();
  if(opts.navigate !== false) go(0, {animate:false, skipThumbPause:true});
  else commitSlideIndex(idx, {fullActiveSync:true});
  if(isEditMode() && overviewGrid){
    refreshRailCatalog();
  }
  scheduleViewParamsWrite();
}
window.__setActiveThemePack=setActiveThemePack;

function applyDeckTransform(){
  deck.style.transform=`translateX(${-idx*deckW}px)`;
}

function measureDeckStage(availableW, availableH, offsetLeft=0){
  const safeW=Math.max(320,availableW);
  const safeH=Math.max(180,availableH);
  const width=Math.min(safeW,safeH*DECK_ASPECT_W/DECK_ASPECT_H);
  const height=width*DECK_ASPECT_H/DECK_ASPECT_W;
  return {
    width,
    height,
    left:offsetLeft+(safeW-width)/2,
    top:(safeH-height)/2,
  };
}

function layoutDeck(){
  const panel=document.getElementById('preview-panel');
  const panelOpen=isEditMode() && document.body.classList.contains('preview-panel-open');
  const collapsed=document.body.classList.contains('editor-panels-collapsed');
  const panelW=panelOpen && panel ? panel.offsetWidth : 0;
  const railW=isEditMode() && slideRail ? slideRail.offsetWidth : 0;
  const topbarH=(isEditMode() && deckTopbar && !collapsed) ? deckTopbar.offsetHeight : 0;
  const stagePad=(isEditMode() && !collapsed) ? 64 : 0;
  const stage=measureDeckStage(innerWidth-railW-panelW-stagePad*2,innerHeight-topbarH-stagePad*2,railW+stagePad);
  deckW=stage.width;
  deckH=stage.height;
  deckLeft=stage.left;
  deckTop=stage.top+topbarH+stagePad;
  deckScale=deckW/1920;
  document.documentElement.style.setProperty('--deck-w',`${deckW}px`);
  document.documentElement.style.setProperty('--deck-h',`${deckH}px`);
  document.documentElement.style.setProperty('--deck-left',`${deckLeft}px`);
  document.documentElement.style.setProperty('--deck-top',`${deckTop}px`);
  document.documentElement.style.setProperty('--deck-scale',String(deckScale));
  deck.style.width=(total*deckW)+'px';
  deck.style.height=deckH+'px';
  applyDeckTransform();
}
window.__layoutDeck=layoutDeck;
addEventListener('resize',layoutDeck);

let slideRailResizePointerId=null;
let slideRailResizeFrame=null;
function readCssPxVar(name, fallback){
  const value = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name));
  return Number.isFinite(value) ? value : fallback;

const theme10SkipTags = new Set(['STYLE','SCRIPT','BR','HR','DEFS']);
const theme10AtomicTags = new Set(['SVG','CANVAS','IMG','VIDEO','IMAGE-SLOT']);

function theme10ElementChildren(node){
  const out = [];
  for(let child = node?.firstElementChild; child; child = child.nextElementSibling){
    if(!theme10SkipTags.has(child.tagName)) out.push(child);
  }
  return out;
}

function playTheme10Motion(slide){
  if(!slide?.hasAttribute?.('data-deck-active')) return false;
  const wrap = slide?.querySelector?.('.ds-slidewrap');
  const root = wrap?.firstElementChild || wrap;
  if(!root) return false;
  const groups = theme10ElementChildren(root);
  let targets = [];
  groups.forEach(group => {
    const children = theme10ElementChildren(group);
    if(children.length >= 2 && children.length <= 10 && !theme10AtomicTags.has(group.tagName)) targets.push(...children);
    else targets.push(group);
  });
  if(targets.length < 2 || targets.length > 26) targets = groups;
  if(!targets.length) return false;
  targets = targets.map(el => {
    const rect = el.getBoundingClientRect();
    return {el, top:rect.top, left:rect.left};
  }).sort((a,b) => {
    const band = Math.round(a.top / 64) - Math.round(b.top / 64);
    return band !== 0 ? band : a.left - b.left;
  }).map(item => item.el);
  targets.forEach(el => {
    el.classList.remove('ds-anim','ds-fade');
    el.style.removeProperty('--ds-d');
  });
  void root.offsetWidth;
  const step = Math.max(34, Math.min(72, Math.round(620 / targets.length)));
  targets.forEach((el, index) => {
    const position = getComputedStyle(el).position;
    const fade = position === 'absolute' || position === 'fixed' || theme10AtomicTags.has(el.tagName);
    el.style.setProperty('--ds-d', `${50 + index * step}ms`);
    el.classList.add(fade ? 'ds-fade' : 'ds-anim');
  });
  return true;
}

function syncTheme10Motion(activeSlide=getActiveSlide()){
  if(!activeSlide?.querySelector?.('.ds-slidewrap')) return;
  let tries = 0;
  function attempt(){
    if(!activeSlide?.isConnected || !activeSlide.hasAttribute('data-deck-active')) return;
    if(playTheme10Motion(activeSlide)) return;
    if(tries++ < 15) requestAnimationFrame(attempt);
  }
  requestAnimationFrame(attempt);
}

function commitSlideIndex(nextIndex, opts={}){
  if(total <= 0){
    idx=0;
    window.__currentSlideIndex = idx;
    deck.style.transform='translateX(0px)';
    allSlides.forEach(slide => {
      slide.classList.remove('active');
      slide.classList.remove('cv-near');
      slide.removeAttribute('data-deck-active');
    });
    syncNav();
    writeStoredSlideIndex(idx);
    dispatchEvent(new CustomEvent('swiss-slide-change', {detail:{index:idx, slide:null}}));
    return;
  }
  idx=nextIndex;
  window.__currentSlideIndex = idx;
  applyDeckTransform();
  const activeSlide = slides[idx];
  const transitionEntered = window.__transitionEnteredSlide === activeSlide;
  if(opts.fullActiveSync){
    allSlides.forEach(slide => {
      const active = slide === activeSlide;
      slide.classList.toggle('active', active);
      if(active) slide.setAttribute('data-deck-active', '');
      else slide.removeAttribute('data-deck-active');
    });
  }else{
    const previousActive = deck.querySelector(':scope > .slide.active');
    if(previousActive && previousActive !== activeSlide){
      previousActive.classList.remove('active');
      previousActive.removeAttribute('data-deck-active');
    }
    activeSlide.classList.add('active');
    activeSlide.setAttribute('data-deck-active', '');
  }
  applyAdjacentVisibility(idx);
  syncNav();
  const el=slides[idx];
  ensureRuntimeSlideRendered(el, undefined, {isolated:true, context:'commit slide index'});
  syncDeckPageNumbers(el);
  window.__releaseInactiveRuntimeSlides?.(el);
  syncSlideTone(el);
  if(!transitionEntered) syncActiveEffects(el, {skipMotion:opts.skipMotionEffects});
  else {
    syncVideoActivity(el);
    syncIframeActivity(el);
  }
  writeStoredSlideIndex(idx);
  dispatchEvent(new CustomEvent('swiss-slide-change', {detail:{index:idx, slide:el}}));
  if(isEditMode() && overviewGrid){
    syncRailActiveState(opts.scrollRail !== false, {refreshThumbs: opts.refreshRailThumbs !== false});
  }
  preloadAdjacentSlides(idx, isEditMode() ? {delay: opts.force ? 0 : 900, immediate:!!opts.force} : {});
  requestOverviewClosedPrewarm();
  if(window.__playSlide && !transitionEntered && !opts.skipPlaySlide) window.__playSlide(idx);
  if(transitionEntered){
    delete activeSlide.dataset.transitionEnterStarted;
    window.__transitionEnteredSlide = null;
  } else if(window.__transitionEnteredSlide) {
    window.__transitionEnteredSlide = null;
  }
}

function go(n, opts={}){
  blurActiveEditableText();
  if(window.__deckExportLocked && !opts.force) return;
  if(lock){
    if(isEditMode() && !opts.force){
      pendingNavigationDirection = n > idx ? 1 : n < idx ? -1 : pendingNavigationDirection;
    }
    return;
  }
  if(opts.refreshSlideList) refreshSlideList();
  if(total <= 0){
    lock=true;
    commitSlideIndex(0, opts);
    requestAnimationFrame(releaseDeckNavigationLock);
    return;
  }
  const nextIndex=Math.max(0,Math.min(total-1,n));
  const currentSlide=slides[idx];
  const nextSlide=slides[nextIndex];
  const mode = opts.animate === false || nextIndex === idx || nextSlide?.querySelector?.('[data-page-key="theme05_page048"]')
    ? 'none'
    : (window.__getPageTransition?.() || 'none');
  if(mode !== 'none') prepareSlideForTransition(nextSlide);
  if(mode !== 'none' && typeof window.__playPageTransition === 'function' && currentSlide && nextSlide){
    let committed=false;
    const commit=()=>{
      if(committed) return;
      committed=true;
      commitSlideIndex(nextIndex, isEditMode() ? {...opts, skipPlaySlide:true, skipMotionEffects:true} : opts);
    };
    const transitionOptions = isEditMode() ? {...opts, commitEarly:true, nonBlocking:true} : opts;
    const transition = window.__playPageTransition(mode, currentSlide, nextSlide, nextIndex >= idx ? 1 : -1, commit, transitionOptions);
    if(isEditMode()){
      commit();
      Promise.resolve(transition).catch(error => console.warn('[page transition]', error));
      return;
    }
    lock=true;
    Promise.resolve(transition)
      .catch(error => console.warn('[page transition]', error))
      .finally(() => {
        commit();
        requestAnimationFrame(releaseDeckNavigationLock);
      });
    return;
  }
  lock=true;
  commitSlideIndex(nextIndex, isPresentMode() ? {...opts, skipPlaySlide:true, skipMotionEffects:true} : opts);
  requestAnimationFrame(releaseDeckNavigationLock);
}

function moveSlide(fromIndex, insertIndex){

  if(fromIndex < 0 || fromIndex >= total) return false;
  const activeSlide = slides[idx];

  if(fromIndex < insertIndex) insertIndex -= 1;
  insertIndex = Math.max(0, Math.min(slides.length, insertIndex));
  slides.splice(insertIndex, 0, slide);
  slides.forEach(item => deck.appendChild(item));
  refreshSlideList();
  idx = Math.max(0, slides.indexOf(activeSlide));

function duplicateCatalogSlide(catalogIndex){
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  const source = catalogSlides[catalogIndex];
  if(!source) return false;
  const previousActiveSlide = slides[idx];
  const sourceId = getSlideVmId(source, allSlides.indexOf(source));
  const copyId = `${sourceId}__copy_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 6)}`;
  const clone = source.cloneNode(true);
  releaseTemplateVideoElements(clone);
  uniquifySvgCloneIds(clone, 'duplicated-slide');
  prepareDuplicatedSlideClone(clone, source, copyId);
  deck.insertBefore(clone, source.nextSibling);
  const sourceModel = window.__deckViewModel?.model?.slides?.find(item => item.id === sourceId);
  const state = window.__deckViewModel?.getState?.() || {};
  window.__deckViewModel?.addDuplicatedSlide?.({
    type:'copy',
    sourceId,
    copyId,
    copyKey:copyId,
    themePack:source.dataset.themePack || activeThemePack || '',
    props:{...(state.props?.[sourceId] || {})},
  }, sourceModel);
  window.__initEditableText?.(clone);
  ensureRuntimeSlideRendered(clone, undefined, {isolated:true, context:'duplicate slide'});
  const sourceCache = overviewThumbBitmapCache.get(getOverviewThumbCacheKey(source));
  if(sourceCache) rememberOverviewThumb(clone, sourceCache);
  updateAfterCatalogMutation(previousActiveSlide, idx, {type:'copy', sourceId, slideId:copyId});

}

function prepareDuplicatedSlideClone(clone, source, copyId){
  clone.id = copyId;
  clone.dataset.vmSlideId = copyId;
  clone.dataset.vmSlideKey = copyId;
  clone.dataset.slideId = copyId;
  clone.dataset.duplicatedSlide = 'true';
  clone.classList.remove('active');
  clone.removeAttribute('data-deck-active');
  clone.removeAttribute('aria-hidden');
  clone.hidden = false;
  clone.querySelectorAll('[data-editable-id]').forEach(el => {
    el.removeAttribute('data-editable-id');
    el.removeAttribute('contenteditable');
    el.removeAttribute('spellcheck');
    el.removeAttribute('role');
    delete el.dataset.editableReady;
    delete el.dataset.editing;
    delete el.dataset.editBefore;
    if(el.dataset.syncText) el.dataset.syncText = `${copyId}:${el.dataset.syncText}`;
  });
  clone.querySelectorAll('[id]').forEach(el => {
    if(el === clone) return;
    if(/^(clip|mask|filter|pattern|gradient|linear|radial)/i.test(el.id || '')) return;
    el.id = `${el.id}__${copyId}`;
  });
  clone.querySelectorAll('image-slot[id],.dslot[id],.acl-slot[id],.kx-imgslot[id],[data-slot-id],[data-dashi-slot-id]').forEach((el, index) => {
    if(el.id) el.id = `${el.id}__${copyId}`;
    if(el.dataset.slotId) el.dataset.slotId = `${copyId}:${el.dataset.slotId}`;
    if(el.dataset.dashiSlotId) el.dataset.dashiSlotId = `${copyId}:${el.dataset.dashiSlotId}`;
    if(el.dataset.mediaKey) el.dataset.mediaKey = `${copyId}:${el.dataset.mediaKey}`;
    if(!el.id && el.tagName?.toLowerCase?.() === 'image-slot') el.id = `${copyId}-slot-${index + 1}`;
  });
}

function toggleCatalogSlideSkipped(catalogIndex){

  updateAfterCatalogMutation(previousActiveSlide === slide ? null : previousActiveSlide, preferredIndex, {type:currentlySkipped ? 'unskip' : 'skip', slideId});
  return true;
}

function getOverviewGridMetrics(grid=overviewGrid){
  if(!grid) return null;
  const cards = getOverviewCards(grid);
  const firstCard = cards[0];
  if(!firstCard) return null;
  const style = getComputedStyle(grid);
  const columns = (style.gridTemplateColumns || '').split(' ').filter(Boolean).length || 1;
  const rowGap = parseFloat(style.rowGap || style.gap || OVERVIEW_CARD_GAP + 10) || (OVERVIEW_CARD_GAP + 10);
  const cardRect = firstCard.getBoundingClientRect();
  const cardHeight = firstCard.offsetHeight || cardRect.height || 1;
  const nextRowCard = cards[columns];
  const measuredRowHeight = nextRowCard ? nextRowCard.offsetTop - firstCard.offsetTop : 0;
  return {
    columns,
    rowHeight: measuredRowHeight > 0 ? measuredRowHeight : cardHeight + rowGap,
    cardHeight,
    gridTop: firstCard.offsetTop,
  };
}

function getOverviewThumbRange(grid=overviewGrid, {includeNear=false}={}){
  if(!grid) return {cards:[], visibleCards:[], nearCards:[]};
  const cards = getOverviewCards(grid);
  const metrics = getOverviewGridMetrics(grid);
  if(!metrics || !cards.length) return {cards:[], visibleCards:[], nearCards:[]};
  const rangeFor = margin => {
    const top = ov.scrollTop - margin;
    const bottom = ov.scrollTop + ov.clientHeight + margin;
    const startRow = Math.max(0, Math.floor((top - metrics.gridTop) / metrics.rowHeight));
    const endRow = Math.max(startRow, Math.floor((bottom - metrics.gridTop - 1) / metrics.rowHeight));
    const start = Math.max(0, startRow * metrics.columns);
    const end = Math.min(cards.length, (endRow + 1) * metrics.columns);
    return cards.slice(start, end);
  };
  const visibleCards = rangeFor(0);
  const nearCards = includeNear ? rangeFor(OVERVIEW_THUMB_NEAR_MARGIN).filter(card => !visibleCards.includes(card)) : [];
  return {cards:[...visibleCards, ...nearCards], visibleCards, nearCards};
}

function animateOverviewFlow(grid, fromRects){
  if(!fromRects) return;
  requestAnimationFrame(() => {
    getOverviewCards(grid).forEach(card => {
      const from = fromRects[card.dataset.slideKey || card.dataset.index];
      if(!from) return;
      const to = card.getBoundingClientRect();
      const dx = from.left - to.left;
      const dy = from.top - to.top;
      if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      card.style.transition = 'none';
      card.style.transform = `translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(() => {
        card.style.transition = 'outline-color .2s,opacity .2s,transform .32s cubic-bezier(.2,.8,.2,1)';
        card.style.transform = 'translate(0, 0)';
      });
    });
  });
}

function getOverviewDropSlot(e, grid, rects=overviewDragRects){
  if(!rects?.length) return null;
  const y = e.clientY;
  let best = null;
  rects.forEach((item, index) => {
    const rect = item.rect;
    const cy = rect.top + rect.height / 2;
    const x = e.clientX;
    const dx = Math.max(rect.left - x, 0, x - rect.right);
    const dy = Math.max(rect.top - y, 0, y - rect.bottom);
    const distance = dx * dx + dy * dy;
    if(!best || distance < best.distance) best = {item, index, rect, distance, before:y < cy};
  });
  if(!best) return null;
  const index = best.before ? best.index : best.index + 1;
  const marker = getOverviewDropMarkerRect(rects, index);
  return marker ? {index, kind:'horizontal', ...marker} : null;
}

function getOverviewDropMarkerRect(rects, index){
  const previous = rects[index - 1]?.rect;
  const next = rects[index]?.rect;
  let y = 0;
  if(previous && next){
    y = (previous.bottom + next.top) / 2;
  }else if(next){
    y = next.top - OVERVIEW_CARD_GAP / 2;
  }else if(previous){
    y = previous.bottom + OVERVIEW_CARD_GAP / 2;
  }else{
    return null;
  }
  return {y};
}

function applyOverviewPreviewGeometry(node, width, height){
  const targetWidth = OVERVIEW_CARD_WIDTH;
  const targetHeight = OVERVIEW_CARD_WIDTH * OVERVIEW_ASPECT_H / OVERVIEW_ASPECT_W;
  const scale = Math.min(targetWidth / width, targetHeight / height);
  const x = (targetWidth - width * scale) / 2;
  const y = (targetHeight - height * scale) / 2;
  node.dataset.overviewSourceWidth=String(width);
  node.dataset.overviewSourceHeight=String(height);
  node.dataset.overviewFitSignature = `${width}x${height}:${targetWidth}x${targetHeight}`;
  node.style.cssText=`width:${width}px;height:${height}px;--deck-w:${width}px;--deck-h:${height}px;--deck-scale:1;transform-origin:top left;position:absolute;top:0;left:0;margin:0;pointer-events:none;transform:translate(${x}px, ${y}px) scale(${scale});contain:layout paint style`;
}

function fitOverviewThumb(wrap, sourceSize=getOverviewSourceSize()){
    const clone = wrap.firstElementChild;
    if(!clone) return;
    const width = Number(clone.dataset.overviewSourceWidth || 0) || sourceSize.width;
    const height = Number(clone.dataset.overviewSourceHeight || 0) || sourceSize.height;
    const rect = wrap.getBoundingClientRect();
    const targetWidth = rect.width || wrap.clientWidth || OVERVIEW_CARD_WIDTH;
    const targetHeight = rect.height || wrap.clientHeight || (targetWidth * OVERVIEW_ASPECT_H / OVERVIEW_ASPECT_W);
    const roundedTargetWidth = Math.round(targetWidth * 100) / 100;
    const roundedTargetHeight = Math.round(targetHeight * 100) / 100;
    const fitSignature = `${width}x${height}:${roundedTargetWidth}x${roundedTargetHeight}`;
    if(clone.dataset.overviewFitSignature === fitSignature) return;
    wrap.style.aspectRatio = `${OVERVIEW_ASPECT_W} / ${OVERVIEW_ASPECT_H}`;
    clone.style.width = `${width}px`;
    clone.style.height = `${height}px`;
    const scale = Math.min(targetWidth / width, targetHeight / height);
    const x = (targetWidth - width * scale) / 2;
    const y = (targetHeight - height * scale) / 2;
    clone.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    clone.dataset.overviewFitSignature = fitSignature;
}

  const titleEl = document.createElement('div');
  titleEl.textContent = title;

  recordOverviewStage('lite-overview-thumbnail', startAt, {
