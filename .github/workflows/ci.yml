name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check lockfile
        run: uv lock --check

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy data_agent

      - name: Run unit and end-to-end tests
        run: uv run python -m unittest discover -s tests -v

      - name: Validate project structure
        run: uv run python scripts/validate_project.py

      - name: Run official Ossie validation
        run: uv run python ossie-main/validation/validate.py semantic/models/demo_sales.yaml

      - name: Run golden analysis
        run: uv run python -m data_agent analyze --input examples/analysis/sales-by-region.json --output /tmp/golden-analysis.json

      - name: Render golden report
        run: uv run python scripts/demo_analysis.py

      - name: Run competency suite
        run: uv run python -m data_agent osi-test --input examples/requests/osi-test.json --output /tmp/competency.json

      - name: Verify checks leave the working tree clean
        run: test -z "$(git status --porcelain --untracked-files=all)"
