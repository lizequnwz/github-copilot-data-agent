  queueMicrotask(() => renderPropControls());

  function localizedPropOptionLabel(label, value, index = 0){
    const i18n = window.__deckI18n;
    if(value == null || label == null) return i18n?.isEn ? 'Hidden' : '隐藏';
    const raw = String(label).trim();
    const valueText = String(value).trim();
    if(/^#[0-9a-f]{3,8}$/i.test(valueText) && raw === valueText) return i18n?.isEn ? `Color ${index + 1}` : `颜色 ${index + 1}`;
    if(i18n?.isEn){
      // metadata 中文选项名查词典;本就是英文的值保持原样(仅首字母大写),
      // ENGLISH_PROP_OPTION_LABELS(英→中)在 en 下不参与。
      if(/[一-鿿]/.test(raw)) return i18n.meta(raw);
      return raw.charAt(0).toUpperCase() + raw.slice(1);
    }
    const labels = ENGLISH_PROP_OPTION_LABELS || {};
    const exact = labels[raw.toLowerCase()] || labels[valueText.toLowerCase()];
    if(exact && (raw === valueText || /^[A-Za-z0-9_./ -]+$/.test(raw))) return exact;
    return raw.replace(/\bYES\b/g, '是').replace(/\bNO\b/g, '否').replace(/\b8-bit\b/gi, '像素');
  }

  function propOptions(control){
    const options = normalizePropOptions(control?.options);
    if(options.length || control?.key !== 'labelType') return options;
    return [
      {value:'number', label:window.__deckI18n.ui('数字'), image:''},
      {value:'symbol', label:window.__deckI18n.ui('符号'), image:''},
      {value:'keyword', label:window.__deckI18n.ui('关键词'), image:''},
    ];
  }

  function isPaletteOption(item){
    return item.length > 1 && item.every(value => /^#[0-9a-f]{3,8}$/i.test(String(value || '')));
  }

  function paletteSwatchBackground(colors){
    const count = Math.max(1, colors.length);
    if(count === 1) return colors[0];
    const stops = colors.map((color, index) => {
      const from = index / count * 100;
      const to = (index + 1) / count * 100;
      return `${color} ${from}% ${to}%`;
    });
    return `linear-gradient(135deg, ${stops.join(', ')})`;
  }

  function propSwatchColor(control, item){
    if(item.color) return item.color;
    const named = {
      scheme: {
        green: 'linear-gradient(135deg,#c9f24d 0 48%,#37f5ff 52% 100%)',
        violet: 'linear-gradient(135deg,#8b5cf6 0 48%,#f472b6 52% 100%)',
      },
      accent: {
        blue: '#2742ec',
        lime: '#c2f53d',
      },
      accentTone: {
        green: '#22c55e',
        yellow: '#facc15',
        blue: '#3b82f6',
        pink: '#ec4899',
      },
    };
    return named[control.key]?.[String(item.value)] || String(item.value || 'transparent');
  }

  function coercePropValue(control, value){
    const controlType = normalizePropControlType(control.type, control);
    if(controlType === 'toggle') return value === true || value === 'true' || value === 1 || value === '1';
    if(controlType === 'range' || controlType === 'slider' || controlType === 'number'){
      return Number.isFinite(Number(value)) ? Number(value) : Number(control.min ?? 0);
    }
    if(controlType === 'select' || controlType === 'segment'){
      const options = propOptions(control);
      let match = options.find(item => String(item.value) === String(value));
      if(!match && control.display === 'color'){
        match = options.find(item => Array.isArray(item.value) && String(item.value[0]) === String(value));
      }
      if(match) return match.value;
    }
    if(controlType === 'icons'){
      if(value == null || value === '') return null;
      const match = propOptions(control).find(item => String(item.value) === String(value));
      return match ? match.value : String(value);
    }
    if(controlType === 'image-list') return Array.isArray(value) ? value : [];
    if(controlType === 'image') return value == null ? '' : String(value);
    return value == null ? '' : String(value);
  }

  function applyPropValues(slide, values, opts = {}){
    if(!slide) return;
    const root = slide.querySelector('[data-prop-controls]');
    if(!root) return;
    const next = {...parsePropDefaults(root), ...getSlideSourceProps(slide), ...(values || {})};
    if(opts.persist !== false) viewModel?.setProps?.(slide.dataset.vmSlideId, next);
    if(opts.persist !== false) window.__markOverviewThumbDirty?.(slide);
    if(opts.unicornRefresh){
      slide.querySelectorAll('.bt-unicorn-frame').forEach(frame => window.__resetUnicornSceneFrame?.(frame));
    }
    if(window.__renderRuntimeSlide?.(slide, next)){
      window.__initEditableText?.(slide);
      // A control-panel tweak re-renders the already-active slide in place —
      // not a slide entry/transition. `skipMotion` avoids replaying theme10's
      // JS-driven entrance stagger (playTheme10Motion) on every prop change;
      // other themes' pure-CSS entrance already only fires once on mount, so
      // this is a no-op for them.
      window.__syncActiveEffects?.(slide, {skipMotion:true});
      requestAnimationFrame(() => window.__initUnicornScenes?.(slide, {force:true}));
    }
  }

  function setEditorPanelsCollapsed(collapsed){
    const next = Boolean(collapsed);
    document.body.classList.toggle('editor-panels-collapsed', next);
    document.body.classList.toggle('preview-panel-open', !next);
    syncEditorPanelState();
    window.__setEditableTextMode?.(canEditDeck());
    requestEditorShellLayout();
  }

  function syncEditorPanelState(){
    const collapsed = document.body.classList.contains('editor-panels-collapsed');
    panel.setAttribute('aria-hidden', collapsed ? 'true' : 'false');
    slideRail?.setAttribute('aria-hidden', collapsed ? 'true' : 'false');
    if(isEditMode()){
      panel.inert = collapsed;
      if(slideRail) slideRail.inert = collapsed;
    }
    if(panelCollapse){
      const label = window.__deckI18n.ui(collapsed ? '展开面板' : '收起面板');
      panelCollapse.classList.toggle('is-collapsed', collapsed);
      panelCollapse.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      panelCollapse.setAttribute('aria-label', label);
      panelCollapse.setAttribute('title', label);
    }
  }

  function requestEditorShellLayout(){
    requestAnimationFrame(() => {
      window.__layoutDeck?.();
      window.__fitOverviewThumbnails?.();
    });
  }
  window.__setEditorPanelsCollapsed = setEditorPanelsCollapsed;
  window.__getEditorPanelsCollapsed = () => document.body.classList.contains('editor-panels-collapsed');

  panel.addEventListener('mousedown', e => e.stopPropagation());
  panelCollapse?.addEventListener('mousedown', e => e.stopPropagation());
  panelCollapse?.addEventListener('click', () => setEditorPanelsCollapsed(!document.body.classList.contains('editor-panels-collapsed')));
  document.getElementById('preview-present-btn')?.addEventListener('click', () => window.__enterPresentMode?.());
  syncEditorPanelState();
  window.__setEditableTextMode?.(canEditDeck());
  requestEditorShellLayout();

  // merged export dropdown
  const exportWrap = document.getElementById('preview-export-wrap');
  const exportMain = document.getElementById('preview-export-main');
  const setExportOpen = (open) => {
    exportWrap?.classList.toggle('open', open);
    exportMain?.setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  exportMain?.addEventListener('click', e => {
    e.stopPropagation();
    setExportOpen(!exportWrap.classList.contains('open'));
  });
  document.addEventListener('click', e => {
    if(exportWrap && !exportWrap.contains(e.target)) setExportOpen(false);
  });
  document.getElementById('preview-export')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckHtml?.(); });
  document.getElementById('preview-export-pdf')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckPdf?.(); });
  document.getElementById('preview-export-pptx')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckPptx?.(); });
  document.getElementById('preview-reset')?.addEventListener('click', () => {
    localStorage.removeItem(STORE);
    Object.keys(localStorage).filter(key => key.startsWith(`${STORE}:`)).forEach(key => localStorage.removeItem(key));
    localStorage.removeItem('dashi-ppt-view-model');
    Object.keys(localStorage).filter(key => key.startsWith('dashi-ppt-current-slide:')).forEach(key => localStorage.removeItem(key));
    location.reload();
  });

  function getCurrentSlide(){
    if(!deckSlides.length) deckSlides = readPreviewDeckSlides();
    const index = window.__currentSlideIndex || 0;
    return deckSlides[index] || null;
  }
})();

<script>
/* =============== Static HTML Export =============== */
(function(){
  const deck = document.getElementById('deck');
  if(!deck) return;
  window.__deckExportLocked = false;

  const vendorScriptPromises = new Map();
  function ensureVendorScript(src, readyCheck){
    if(readyCheck?.()) return Promise.resolve();
    if(vendorScriptPromises.has(src)) return vendorScriptPromises.get(src);
    const promise = new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src;
      script.onload = () => resolve();
      script.onerror = () => { vendorScriptPromises.delete(src); reject(new Error(window.__deckI18n.ui('无法加载组件 {src}', {src: src}))); };
      document.head.appendChild(script);
    });
    vendorScriptPromises.set(src, promise);
    return promise;
  }
  function ensureHtmlToImageLoaded(){
    return ensureVendorScript('assets/vendor/html-to-image.js', () => window.htmlToImage);
  }

  async function waitForSlideMediaReadyForCapture(root){
    const images = [...root.querySelectorAll('img')].filter(img => { const r = img.getBoundingClientRect(); return r.width > 1 && r.height > 1 && !img.complete; });
    if(!images.length) return;
    await Promise.race([
      Promise.all(images.map(img => new Promise(resolve => { img.addEventListener('load', resolve, { once: true }); img.addEventListener('error', resolve, { once: true }); }))),
      new Promise(resolve => setTimeout(resolve, 4000)),
    ]);
  }

  function finishSlideAnimationsForCapture(root){
    (root.getAnimations?.({ subtree: true }) || []).forEach(animation => {
      try {
        const timing = animation.effect?.getComputedTiming?.();
        const endTime = Number(timing?.endTime);
        if(Number.isFinite(endTime) && endTime > 0) animation.finish();
        else animation.pause();
      } catch {}
    });
    try {
      (window.gsap?.globalTimeline?.getChildren?.(true, true, true) || []).forEach(tween => {
        const targets = typeof tween.targets === 'function' ? tween.targets() : [];
        if(!targets.some(target => target instanceof Node && root.contains(target))) return;
        const duration = Number(tween.totalDuration?.());
        if(Number.isFinite(duration) && duration > 0) tween.progress?.(1);
        tween.pause?.();
      });
    } catch {}
  }

  async function assemblePdfInBrowser(pages, title){
    await ensureVendorScript('assets/vendor/pdf-lib.min.js', () => window.PDFLib?.PDFDocument);
    const { PDFDocument } = window.PDFLib;
    const pdf = await PDFDocument.create();
    pdf.setTitle(title || 'Deck PDF Export');
    pdf.setAuthor('DashiAI PPT');
    pdf.setSubject('Browser-captured PDF export');
    const PDF_W = 16 * 72, PDF_H = 9 * 72;
    for(const dataUrl of pages){
      const base64 = String(dataUrl || '').split(',')[1] || '';
      const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      const image = /^data:image\/png/i.test(dataUrl) ? await pdf.embedPng(bytes) : await pdf.embedJpg(bytes);
      const page = pdf.addPage([PDF_W, PDF_H]);
      page.drawImage(image, { x: 0, y: 0, width: PDF_W, height: PDF_H });
    }
    const out = await pdf.save();
    return new Blob([out], { type: 'application/pdf' });
  }

  async function captureDeckPagesInBrowser(exportUi){
    await ensureHtmlToImageLoaded();
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    if(!slides.length) throw new Error(window.__deckI18n.ui('没有可导出的页面。'));
    const originalIndex = Math.max(0, slides.findIndex(slide => slide.classList.contains('active')));
    const waitFrame = () => new Promise(resolve => requestAnimationFrame(resolve));
    const pages = [];
    try {
      for(let index = 0; index < slides.length; index += 1){
        throwIfDeckExportCancelled(exportUi);
        updateDeckExport(exportUi, index, slides.length, window.__deckI18n.ui('浏览器内截取第 {current}/{total} 页...', {current: index + 1, total: slides.length}));
        window.go?.(index, { animate: false, force: true });
        await waitFrame(); await waitFrame();
        const slide = slides[index];
        slides.forEach((item, slideIndex) => {
          const active = slideIndex === index;
          item.classList.toggle('active', active);
          if(active) item.setAttribute('data-deck-active', '');
          else item.removeAttribute('data-deck-active');
        });
        window.__ensureRuntimeSlideRendered?.(slide);
        window.__restoreEffectIframes?.(slide);
        window.__syncDeckPageNumbers?.(slide);
        window.__layoutDeck?.();
        window.__initUnicornScenes?.(slide, { force: true });
        if(document.fonts?.ready) await Promise.race([document.fonts.ready.catch(() => {}), new Promise(resolve => setTimeout(resolve, 2500))]);
        await waitForSlideMediaReadyForCapture(slide);
        finishSlideAnimationsForCapture(slide);
        await waitFrame(); await waitFrame();
        const capture = window.htmlToImage.toJpeg(slide, withSlideCaptureFilter({ quality: 0.92, pixelRatio: 1.5, backgroundColor: '#000000' }));
        const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error(window.__deckI18n.ui('第 {n} 页截图超时', {n: index + 1}))), 30000));
        pages.push(await Promise.race([capture, timeout]));
      }
    } finally {
      window.go?.(originalIndex, { animate: false, force: true });
      window.__syncActiveEffects?.();
    }
    return pages;
  }

  // 浏览器内 PDF 导出:服务器在沙箱型宿主(如豆包)里无法启动导出浏览器时的兜底——
  // 截图发生在用户自己打开预览页的浏览器(正常桌面进程,不受宿主沙箱影响),
  // 服务器只用 pdf-lib 做纯 JS 合成。可手动调用,也由 __exportDeckPdf 自动降级触发。
  async function runBrowserPptxExportInFrame(options){
    const frame = document.createElement('iframe');
    frame.style.cssText = 'position:fixed;left:-20020px;top:0;width:1920px;height:1080px;border:0;visibility:hidden;pointer-events:none';
    frame.setAttribute('aria-hidden', 'true');
    frame.src = location.pathname + location.search;
    document.body.appendChild(frame);
    try {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error(window.__deckI18n.ui('导出环境加载超时'))), 30000);
        frame.onload = () => { clearTimeout(timer); resolve(); };
        frame.onerror = () => { clearTimeout(timer); reject(new Error(window.__deckI18n.ui('导出环境加载失败'))); };
      });
      const win = frame.contentWindow;
      const doc = frame.contentDocument;
      // 等 iframe 内 deck 就绪
      await new Promise((resolve, reject) => {
        const deadline = Date.now() + 30000;
        (function poll(){
          if(doc.querySelector('#deck > .slide.active') && typeof win.go === 'function') return resolve();
          if(Date.now() > deadline) return reject(new Error(window.__deckI18n.ui('导出环境的页面未就绪')));
          setTimeout(poll, 120);
        })();
      });
      // 注入导出组件
      for(const [src, ready] of [
        ['assets/vendor/html-to-image.js', () => win.htmlToImage],
        ['assets/vendor/pptxgen.bundle.js', () => typeof win.PptxGenJS === 'function'],
        ['assets/vendor/editable-pptx-browser.js', () => win.__editablePptxBrowser?.exportEditablePptxInBrowser],
      ]){
        if(ready()) continue;
        await new Promise((resolve, reject) => {
          const script = doc.createElement('script');
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(window.__deckI18n.ui('无法加载组件 {src}', {src: src})));
          doc.head.appendChild(script);
        });
      }
      return await win.__editablePptxBrowser.exportEditablePptxInBrowser(options);
    } finally {
      frame.remove();
    }
  }

  // 浏览器内可编辑 PPTX 导出:服务器在沙箱型宿主里起不了无头浏览器时的降级——
  // 采集/截图/组装全部在用户当前浏览器完成(assets/vendor/editable-pptx-browser.js),
  // 服务器只负责把成品二进制落盘(/api/export-pptx-store)。可手动调用,也由
  // __exportDeckPptx 自动降级触发。
  window.__exportDeckPptxInBrowser = async function(existingUi){
    if(window.__deckExportLocked && !existingUi) return;
    let exportUi = existingUi || null;
    const owns = !exportUi;
    try {
      if(owns) exportUi = beginDeckExport('PPTX');
      updateDeckExport(exportUi, 0, 1, window.__deckI18n.ui('准备浏览器内导出环境...'));
      window.__syncDeckPageNumbers?.();
      window.__flushEditableTextState?.();
      window.__syncDeckViewModelFromDom?.();
      throwIfDeckExportCancelled(exportUi);
      const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
      // 在屏外 1920×1080 iframe 里跑导出:视口与服务端无头浏览器完全一致(deck 缩放
      // 为 1:1,细元素不会被视口阈值过滤),同时不打断用户正在看的页面;当前的编辑
      // 状态经 snapshot 带入 iframe。
      const { blob, report } = await runBrowserPptxExportInFrame({
        snapshot: buildEditablePptxExportSnapshot(),
        title: document.title || 'Presentation',
        onProgress: update => {
          if(!update?.detail) return;
          const percent = Number(update.percent || 0);
          updateDeckExport(exportUi, Math.min(slides.length, Math.round((percent / 100) * slides.length)), slides.length, window.__deckI18n.ui('{detail}(浏览器内导出)', {detail: window.__deckI18n.exportDetail(update.detail)}));
        },
      });
      throwIfDeckExportCancelled(exportUi);
      updateDeckExport(exportUi, slides.length, slides.length, window.__deckI18n.ui('保存 PPTX...'));
      const downloadName = `${getDeckFileName()}.pptx`;
      // 优先经预览服务落盘(产物进 output/exports,可追溯);静态文件服务器(node/python
      // 静态托管)没有该端点——直接把 blob 交给浏览器下载,导出不依赖任何服务端能力。
      let result = null;
      try {
        const response = await fetch(`/api/export-pptx-store?fileName=${encodeURIComponent(getDeckFileName())}`, {
          method: 'POST',
          headers: {'content-type': 'application/octet-stream'},
          body: blob,
        });
        if(response.ok) result = await response.json();
      } catch {}
      if(result?.downloadUrl){
        window.__lastPptxExportResult = { ...result, ...report, downloadStarted: false };
        const downloadStarted = startServerExportDownload(result.downloadUrl, 'PPTX');
        window.__lastPptxExportResult.downloadStarted = downloadStarted;
        updateDeckExport(exportUi, slides.length, slides.length, downloadStarted ? window.__deckI18n.ui('PPTX 已开始下载(浏览器内导出)') : window.__deckI18n.ui('PPTX 已生成：{name}', {name: result.relativePath || result.downloadName || 'download'}));
        if(!downloadStarted) alert(window.__deckI18n.ui('PPTX 已生成：\n{name}', {name: result.downloadName || result.relativePath || 'download'}));
        return result;
      }
      downloadBlob(blob, downloadName);
      result = { ok: true, browserCapture: true, blobDownload: true, downloadName, ...report, downloadStarted: true };
      window.__lastPptxExportResult = result;
      updateDeckExport(exportUi, slides.length, slides.length, window.__deckI18n.ui('PPTX 已开始下载(浏览器内导出)'));
      return result;
    } catch (error) {
      if(isDeckExportCancelledError(error)) return null;
      if(!owns) throw error;
      console.error('[export pptx][browser-capture]', error);
      alert(error?.message || window.__deckI18n.ui('PPTX 浏览器内导出失败,请在浏览器控制台查看错误。'));
      return null;
    } finally {
      if(owns) endDeckExport(exportUi);
      window.__syncActiveEffects?.();
    }
  };

  function createPdfExportProgressId(){

  function beginPdfExportProgressPolling(exportUi, progressId){
    let stopped = false;
    const read = async () => {
      if(stopped || !progressId) return;
      try {
        const response = await fetch(`/api/export-pdf-progress?id=${encodeURIComponent(progressId)}`, {
          cache: 'no-store',
          credentials: 'same-origin',
        });
        if(!response.ok) return;
        const progress = await response.json();
        const percent = Math.max(0, Math.min(100, Number(progress.percent || 0)));
        const detail = progress.detail ? window.__deckI18n.exportDetail(progress.detail) : window.__deckI18n.ui('正在生成截图 PDF');
        updateDeckExport(exportUi, percent, 100, `${detail} · ${Math.round(percent)}%`);
      } catch {}
      if(!stopped) setTimeout(read, 450);
    };
    read();
    return { stop(){ stopped = true; } };
  }

  function createEditablePptxProgressId(){
    const random = Math.random().toString(36).slice(2, 10);
    return `pptx-${Date.now().toString(36)}-${random}`;
  }

  function isCodexInAppBrowser(){
    const ua = String(navigator.userAgent || '');
    const brands = (navigator.userAgentData?.brands || [])
      .map(item => `${item.brand || ''} ${item.version || ''}`)
      .join(' ');
    return /\b(CodexBrowser|OpenAI Codex|Codex Desktop|ChatGPT-Codex)\b/i.test(`${ua} ${brands}`);
  }

  function beginEditablePptxProgressPolling(exportUi, progressId){
    let stopped = false;
    const read = async () => {
      if(stopped || !progressId) return;
      try {
        const response = await fetch(`/api/export-editable-pptx-progress?id=${encodeURIComponent(progressId)}`, {
          cache: 'no-store',
          credentials: 'same-origin',
        });
        if(!response.ok) return;
        const progress = await response.json();
        const percent = Math.max(1, Math.min(99, Number(progress?.percent || 0)));
        const detail = progress?.detail || window.__deckI18n.ui('正在生成可编辑 PPTX');
        updateDeckExport(exportUi, percent, 100, detail);
      } catch {}
    };
    const timer = setInterval(read, 500);
    read();
    return {
      stop(){

        clearInterval(timer);

  function buildEditablePptxExportSnapshot(){
    return {
      themePack: document.documentElement.dataset.themePack || '',
      currentIndex: window.__currentSlideIndex || 0,
      state: window.__getDeckViewModelState?.() || {},
      canvasSnapshots: collectEditablePptxCanvasSnapshots(),
    };
  }

  // 导出走 snapshot(见 buildPdfExportSnapshot / collectEditablePptxCanvasSnapshots)把当前主题包/
  // 页面/编辑状态整份带给服务端,sourcePath 只用来定位要打开的 HTML 文件——不需要,也不应该带上
  // 任何查询参数(轻量视图定位参数也不例外),避免污染导出产物。
  function getServerExportSourcePath() {
    return new URL(location.href).pathname;
  }

  function startServerExportDownload(downloadUrl, exportType){
    if(!downloadUrl) return false;
    try {
      const url = new URL(downloadUrl, location.href);
      if(url.origin !== location.origin) return false;
      const file = url.searchParams.get('file') || '';
      const expected = exportType === 'PDF'
        ? {path:'/api/export-pdf-download', ext:'.pdf'}
        : exportType === 'PPTX'
          ? {path:'/api/export-editable-pptx-download', ext:'.pptx'}
          : null;
      if(!expected) return false;
      if(url.pathname !== expected.path) return false;
      if(!file.toLowerCase().endsWith(expected.ext)) return false;
      location.assign(url.href);
      return true;
    } catch {
      return false;
    }
  }

  function collectEditablePptxCanvasSnapshots(){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    const out = [];
    slides.forEach((slide, slideIndex) => {
      const slideRect = slide.getBoundingClientRect();
      if(!slideRect.width || !slideRect.height) return;
      slide.querySelectorAll('canvas').forEach((canvas, canvasIndex) => {
        if(canvas.closest('.bt-unicorn-frame')) return;
        const style = getComputedStyle(canvas);
        const rect = canvas.getBoundingClientRect();
        if(style.display === 'none' || style.visibility === 'hidden' || Number(style.opacity || 1) <= 0.01) return;
        if(rect.width <= 1 || rect.height <= 1) return;
        try {
          const data = canvas.toDataURL('image/png');
          out.push({
            slideIndex,
            canvasIndex,
            data,
            left: (rect.left - slideRect.left) / slideRect.width * 100,
            top: (rect.top - slideRect.top) / slideRect.height * 100,
            width: rect.width / slideRect.width * 100,
            height: rect.height / slideRect.height * 100,
          });
        } catch {}
      });
    });
    return out;
  }

  async function materializeExportSlides(exportUi, label){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    for(let index = 0; index < slides.length; index++){
      throwIfDeckExportCancelled(exportUi);
      const slide = slides[index];
      updateDeckExport(exportUi, index, slides.length, window.__deckI18n.ui('{label} 准备第 {current} / {total} 页', {label: label, current: index + 1, total: slides.length}));

      if(index % 2 === 1) await nextFrame();
    }
    updateDeckExport(exportUi, slides.length, slides.length, window.__deckI18n.ui('{label} 页面已准备完成', {label: label}));

  function prepareSlidesForPrint(slides){
    const states = slides.map(slide => ({
      slide,
      active: slide.classList.contains('active'),
      deckActive: slide.hasAttribute('data-deck-active'),
    }));
    slides.forEach(slide => {
      slide.classList.add('active');
      slide.setAttribute('data-deck-active', '');
    });
    return () => states.forEach(({slide, active, deckActive}) => {
      slide.classList.toggle('active', active);
      if(deckActive) slide.setAttribute('data-deck-active', '');
      else slide.removeAttribute('data-deck-active');
    });
  }

  function captureExportViewState(){
    return {
      index: window.__currentSlideIndex || 0,
      mode: deckMode,
      panelOpen: document.body.classList.contains('preview-panel-open'),

  function restoreExportViewState(state){
    if(!state) return;
    go(state.index, {animate:false, force:true});
    setDeckMode(state.mode === 'present' ? 'present' : 'edit');
    if(window.__setEditorPanelsCollapsed) window.__setEditorPanelsCollapsed(Boolean(state.panelsCollapsed));
    else document.body.classList.toggle('editor-panels-collapsed', Boolean(state.panelsCollapsed));

  async function prepareSimpleHtmlExportClone(clone, visibleSlides){
    pruneHiddenSlidesForHtmlExport(clone, visibleSlides);
    materializeHtmlExportViewModel(clone, visibleSlides);
    await inlineLocalScriptsForHtmlExport(clone);
    await embedUnicornAssetsForExport(clone);
    clone.querySelector('.deck-export-overlay')?.remove();
    clone.querySelector('.page-transition-stage')?.remove();
    clone.querySelector('body')?.classList.remove('exporting-deck');
    clone.querySelectorAll('iframe[data-effect-src]').forEach(iframe => {
      if(!iframe.getAttribute('src') && iframe.dataset.effectSrc) iframe.setAttribute('src', iframe.dataset.effectSrc);
    });
    clone.querySelectorAll('.bt-unicorn-frame').forEach(frame => {
      frame.removeAttribute('data-unicorn-ready');
    });
    clone.querySelectorAll('.bt-unicorn-scene').forEach(scene => {
      scene.innerHTML = '';
      scene.removeAttribute('id');
    });
    const clonedPreviewOptions = clone.querySelector('#preview-options');
    if(clonedPreviewOptions){
      try {
        const options = JSON.parse(clonedPreviewOptions.textContent || '{}');
        options.current = {...options.current, ...window.__getPreviewState?.()};
        clonedPreviewOptions.textContent = JSON.stringify(options).replace(/</g, '\\u003c');
      } catch {}
    }
  }

  function materializeHtmlExportViewModel(clone, visibleSlides){
    const vmEl = clone.querySelector('#deck-view-model');
    if(!vmEl || !window.__deckViewModel?.model) return;
    const liveModel = window.__deckViewModel.model;
    const state = liveModel.state || {};
    const sourceSlides = new Map((liveModel.slides || []).map(slide => [slide.id, slide]));
    const slides = (visibleSlides || []).map(slide => {
      const id = slide.dataset.vmSlideId;
      const source = sourceSlides.get(id);
      if(!source) return null;
      return {
        ...source,
        props: {
          ...(source.props || {}),
          ...(state.props?.[id] || {}),
        },
      };
    }).filter(Boolean);
    const slideIds = slides.map(slide => slide.id);
    const model = {
      ...liveModel,
      exportId: 'html-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8),
      slides,
      state: {
        ...(state || {}),
        slideOrder: slideIds,
        skippedSlides: [],
        deletedSlides: [],
        props: {},
      },
    };
    vmEl.textContent = JSON.stringify(model).replace(/</g, '\\u003c');
    const textEl = clone.querySelector('#embedded-text-state');
    if(textEl) textEl.textContent = JSON.stringify(state.text || {}).replace(/</g, '\\u003c');
  }

  function pruneHiddenSlidesForHtmlExport(clone, visibleSlides){
    const visibleIds = new Set((visibleSlides || []).map((slide, index) => getCloneSlideKey(slide, index)).filter(Boolean));
    if(!visibleIds.size) return;
    clone.querySelectorAll('#deck > .slide').forEach((slide, index) => {
      if(!visibleIds.has(getCloneSlideKey(slide, index))){
        slide.remove();
        return;
      }
      slide.hidden = false;
      slide.removeAttribute('hidden');
      slide.removeAttribute('aria-hidden');
      slide.removeAttribute('data-slide-skipped');
    });
  }

  function getCloneSlideKey(slide, index){
    return slide?.dataset?.vmSlideId || slide?.dataset?.vmLayout || slide?.dataset?.layout || `slide-${index + 1}`;
  }

  async function inlineLocalScriptsForHtmlExport(clone){
    const scripts = [...clone.querySelectorAll('script[src^="assets/"]')];
    await Promise.all(scripts.map(async script => {
      const src = script.getAttribute('src');
      try {
        const response = await fetch(src);
        if(!response.ok) return;
        script.textContent = (await response.text()).replace(/<\/script/gi, '<\\/script');
        script.removeAttribute('src');
        script.removeAttribute('crossorigin');
        script.removeAttribute('integrity');
      } catch {}

  async function embedUnicornAssetsForExport(clone){

        ...[...clone.querySelectorAll('script')]

  async function serializeHtmlExportClone(clone, exportUi){
    let html = clone.outerHTML;
    const refs = collectHtmlExportLocalMediaRefs(html);
    if(!refs.length) return html;
    let done = 0;
    const replacements = [];
    await Promise.all(refs.map(async item => {
      throwIfDeckExportCancelled(exportUi);
      const dataUrl = await readHtmlExportLocalAssetDataUrl(item.path);
      done += 1;
      updateDeckExport(exportUi, done, refs.length, window.__deckI18n.ui('HTML 打包素材 {done} / {total}', {done: done, total: refs.length}));
      if(dataUrl) replacements.push({...item, dataUrl});
    }));
    replacements.forEach(({variants, dataUrl}) => {
      variants.forEach(ref => {
        html = html.split(ref).join(dataUrl);
      });
    });
    return html;
  }

  function collectHtmlExportLocalMediaRefs(html){
    const refs = new Map();
    const pattern = /(?:^|["'`(,;:\s=])((?:\.\/|\/)?(?:assets|images|uploads)\/[^"'`<>)\s\\]+?\.(?:png|jpe?g|webp|gif|svg|avif|mp4|webm|mov)(?:[?#][^"'`<>)\s\\]*)?)/gi;
    let match;
    while((match = pattern.exec(html))){
      const raw = match[1];
      const path = normalizeHtmlExportLocalMediaRef(raw);
      if(!path) continue;
      if(!refs.has(path)) refs.set(path, new Set());
      refs.get(path).add(raw);
      const encoded = encodeURI(path);
      if(encoded !== path) refs.get(path).add(encoded);
    }
    return [...refs].map(([path, variants]) => ({path, variants:[...variants]}));
  }

  function normalizeHtmlExportLocalMediaRef(value){
    const raw = String(value || '').trim();
    if(!raw || /^(data:|blob:|https?:|mailto:|tel:|#)/i.test(raw)) return '';
    const clean = raw
      .split('#')[0]
      .split('?')[0]
      .replace(/^\.?\//, '')
      .replace(/^\/+/, '');
    if(!/^(assets|images|uploads)\//.test(clean)) return '';
    if(!/\.(?:png|jpe?g|webp|gif|svg|avif|mp4|webm|mov)$/i.test(clean)) return '';
    return clean;
  }

  async function readHtmlExportLocalAssetDataUrl(path){
    try {
      const response = await fetch(path, {cache:'no-store'});
      if(!response.ok) return '';
      return await blobToDataUrl(await response.blob());
    } catch {
      return '';
    }
  }

  function blobToDataUrl(blob){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(reader.error || new Error('Could not read local export asset.'));
      reader.readAsDataURL(blob);
    });
  }

  function staticUnicornRuntime(){
    const DEFAULT_SDK_URL = 'assets/vendor/unicornstudio.umd.js';
    let sdkPromise = null;
    let sdkPromiseUrl = '';
    let embeddedAssetMap = null;
    const embeddedAssetUrls = new Map();

    window.__initUnicornScenes = initUnicornScenes;
    window.__resetUnicornSceneFrame = resetFrame;
    window.__syncUnicornSceneActivity = syncUnicornSceneActivity;

    addEventListener('swiss-slide-change', event => {
      const {index, slide} = event.detail || {};
      syncUnicornSceneActivity(slide);
      setTimeout(() => {
        if((window.__currentSlideIndex || 0) === index) initUnicornScenes(slide);
      }, 80);
    });

    syncUnicornSceneActivity(getCurrentSlide());
    initUnicornScenes(getCurrentSlide());

    function initUnicornScenes(scope = getCurrentSlide(), options = {}){
      const root = scope instanceof Element ? scope : document;
      const selector = '.bt-unicorn-frame[data-unicorn-project-id],.bt-unicorn-frame[data-unicorn-json-file-path]';
      const frames = [
        ...(root.matches?.(selector) ? [root] : []),
        ...Array.from(root.querySelectorAll(selector)),
      ];
      const activeSlide = getCurrentSlide();
      const pending = frames.filter(frame => {
        if(frame.dataset.unicornReady || frame.closest('.bt-image-slot.has-user-image,.bt-image-slot.has-user-media')) return false;
        return options.force || activeSlide.contains(frame) || frame === activeSlide;
      });
      if(!pending.length) return Promise.resolve([]);
      const sdkUrl = pending[0].dataset.unicornSdkUrl || DEFAULT_SDK_URL;
      return loadSdk(sdkUrl)
        .then(() => Promise.allSettled(pending.map(initFrame)))
        .catch(error => {
          pending.forEach(frame => markFrameFallback(frame, 'runtime-load'));
          return [];
        });
    }

    function getCurrentSlide(){
      const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
      return slides[window.__currentSlideIndex || 0] || document;
    }

    function loadSdk(sdkUrl){
      if(window.UnicornStudio?.addScene) return Promise.resolve();
      if(sdkPromise && sdkPromiseUrl === sdkUrl) return sdkPromise;
      sdkPromiseUrl = sdkUrl;
      sdkPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = sdkUrl;
        script.async = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Failed to load Unicorn SDK ${sdkUrl}`));
        document.head.appendChild(script);
      })
        .then(() => {
          if(!window.UnicornStudio?.addScene) throw new Error('UnicornStudio.addScene not found');
        }).catch(error => {
          sdkPromise = null;
          sdkPromiseUrl = '';
          throw error;
        });
      return sdkPromise;
    }

    function initFrame(frame){
      const scene = frame.querySelector('.bt-unicorn-scene');
      const sourceKey = getFrameSourceKey(frame);
      if(frame.dataset.unicornReady && frame.dataset.unicornActiveSource !== sourceKey) resetFrame(frame);
      if(!scene || frame.dataset.unicornReady) return;
      const elementId = scene.id || `unicorn-${Math.random().toString(36).slice(2, 11)}`;
      scene.id = elementId;
      frame.dataset.unicornReady = 'true';
      frame.dataset.unicornActiveSource = sourceKey;
      const config = {
        elementId,
        scale: Number(frame.dataset.unicornScale || 1),
        dpi: Number(frame.dataset.unicornDpi || 1.5),
        lazyLoad: false,
        production: true,
        altText: 'Shader scene',
        ariaLabel: 'Shader scene',
      };
      if(frame.dataset.unicornJsonFilePath) config.filePath = resolveUnicornJsonFilePath(frame.dataset.unicornJsonFilePath);
      else config.projectId = frame.dataset.unicornProjectId;
      return window.UnicornStudio.addScene(config).then(sceneInstance => {
        frame.__unicornScene = sceneInstance;
      }).catch(error => {
        frame.removeAttribute('data-unicorn-ready');
        frame.removeAttribute('data-unicorn-active-source');
        console.warn('[unicorn] failed to initialize scene', error);
      });
    }

    function markFrameFallback(frame, reason){
      if(!frame) return;
      frame.dataset.unicornFallback = reason || 'runtime';
      frame.removeAttribute('data-unicorn-ready');
      frame.removeAttribute('data-unicorn-active-source');
    }

    function resetFrame(frame){
      if(!frame) return;
      frame.__unicornScene?.destroy?.();
      frame.__unicornScene = null;
      frame.removeAttribute('data-unicorn-ready');
      frame.removeAttribute('data-unicorn-active-source');
      frame.removeAttribute('data-unicorn-fallback');
      const scene = frame.querySelector('.bt-unicorn-scene');
      if(scene){
        scene.innerHTML = '';
        scene.removeAttribute('id');
      }
    }

    function getFrameSourceKey(frame){
      if(!frame) return '';
      if(frame.dataset.unicornJsonFilePath) return `file:${frame.dataset.unicornJsonFilePath}`;
      if(frame.dataset.unicornProjectId) return `project:${frame.dataset.unicornProjectId}`;
      return '';
    }

    function syncUnicornSceneActivity(activeSlide = getCurrentSlide()){
      document.querySelectorAll('.bt-unicorn-frame[data-unicorn-ready]').forEach(frame => {
        if(activeSlide && activeSlide.contains(frame)) return;
        resetFrame(frame);
      });
    }

    function resolveUnicornJsonFilePath(path){
      const source = getEmbeddedUnicornAssets()[path];
      if(!source) return path;
      if(embeddedAssetUrls.has(path)) return embeddedAssetUrls.get(path);
      const url = URL.createObjectURL(new Blob([source], {type:'application/json'}));
      embeddedAssetUrls.set(path, url);
      return url;
    }

    function getEmbeddedUnicornAssets(){
      if(embeddedAssetMap) return embeddedAssetMap;
      const script = document.getElementById('embedded-unicorn-assets');
      if(!script){
        embeddedAssetMap = {};
        return embeddedAssetMap;
      }
      try {
        embeddedAssetMap = JSON.parse(script.textContent || '{}') || {};
      } catch {
        embeddedAssetMap = {};
      }
      return embeddedAssetMap;
    }

    addEventListener('pagehide', () => {
      embeddedAssetUrls.forEach(url => URL.revokeObjectURL(url));
      embeddedAssetUrls.clear();
    });
  }

  const slideCaptureIgnoredTags = new Set(['STYLE', 'SCRIPT', 'NOSCRIPT', 'TEMPLATE']);

  function withSlideCaptureFilter(options = {}){
    const customFilter = options.filter;
    return {
      ...options,
      filter(node){
        if(typeof customFilter === 'function' && !customFilter(node)) return false;
        if(node?.nodeType === 1 && node.tagName === 'IMG' && !(node.currentSrc || node.getAttribute('src'))) return false;
        if(node?.nodeType === 1 && node.tagName === 'VIDEO' && !(node.currentSrc || node.getAttribute('src') || node.querySelector('source[src]'))) return false;
        let current = node?.nodeType === 1 ? node : node?.parentNode;
        while(current){
          if(current.nodeType === 1 && slideCaptureIgnoredTags.has(current.tagName)) return false;
          current = current.parentNode;
        }
        return true;
      },
    };
  }

  function runBrowserPrint(){
    const printWindow = arguments[0] || window;
    return new Promise(resolve => {
      let done = false;
      let timer = null;
      const finish = () => {
        if(done) return;
        done = true;
        clearTimeout(timer);
        printWindow.removeEventListener?.('afterprint', finish);
        resolve();

	  function downloadBlob(blob, filename){
	    const type = blob.type || getDownloadMime(filename);
	    const file = typeof File === 'function'
	      ? new File([blob], filename, {type})
	      : new Blob([blob], {type});
	    const url = URL.createObjectURL(file);
	    retainedDownloadUrls.push(url);
	    const link = document.createElement('a');
	    link.href = url;
	    link.download = filename;
	    link.rel = 'noopener';
	    link.style.display = 'none';
	    document.body.appendChild(link);
	    return new Promise(resolve => {
	      setTimeout(() => {
	        link.click();
	        setTimeout(() => link.remove(), 1000);
	        resolve();
	      }, 0);
	    });
	  }

  function releaseRetainedDownloadUrls(){
    while(retainedDownloadUrls.length){
      URL.revokeObjectURL(retainedDownloadUrls.pop());
    }
  }

  function getDownloadMime(filename){
    const lower = String(filename || '').toLowerCase();
    if(lower.endsWith('.pptx')) return 'application/vnd.openxmlformats-officedocument.presentationml.presentation';
    if(lower.endsWith('.html') || lower.endsWith('.htm')) return 'text/html;charset=utf-8';
    if(lower.endsWith('.pdf')) return 'application/pdf';
    return 'application/octet-stream';
  }

  async function copyPromptText(text, button){

        area.value = text;
        area.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
        document.body.appendChild(area);
        area.select();
        copied = document.execCommand('copy');
        area.remove();

    if(button){
      const original = button.textContent;
      button.textContent = window.__deckI18n.ui(copied ? '已复制' : '复制失败');

<script>
/* =============== Text State =============== */
(function(){
  const deck = document.getElementById('deck');
  if(!deck) return;
  const stateEl = document.getElementById('embedded-text-state');
  const textState = readTextState();
  const defaultTextState = window.__deckDefaultTextState || {};
  const textCounters = new Map();

  window.__deckDefaultTextState = defaultTextState;
  window.__getDeckDefaultTextState = () => ({...defaultTextState});
  window.__initEditableText = scope => applyTextState(scope);
  window.__setEditableTextMode = (on, scope = deck) => syncEditableMode(scope, on);
  window.__flushEditableTextState = flushTextState;
  applyTextState(deck);
  deck.addEventListener('pointerdown', handleEditablePointerDown, true);
  deck.addEventListener('focusin', handleFocusIn, true);
  deck.addEventListener('input', handleInput, true);
  deck.addEventListener('blur', handleBlur, true);

  function applyTextState(scope = deck){
    prepareTextElements(scope);
    syncEditableMode(scope);
  }

  function prepareTextElements(scope = deck){
    const root = scope instanceof Element ? scope : deck;
    resetTextCounters(root);
    const claimedTextIds = new Set();
    const candidates = [
      ...(isTextCandidate(root) ? [root] : []),
      ...root.querySelectorAll('*'),
    ];
    candidates.forEach(el => {
      if(el !== root && !root.contains(el)) return;
      if(el !== root && el.parentElement?.closest('[data-editable-id]')) return;
      if(!el.dataset.editableId && !isTextCandidate(el)) return;
      el.dataset.editableId = claimTextId(el, el.dataset.editableId || explicitTextId(el));
      if(defaultTextState[el.dataset.editableId] === undefined) defaultTextState[el.dataset.editableId] = el.innerHTML;
      if(el.dataset.syncText && defaultTextState[`sync:${el.dataset.syncText}`] === undefined){
        defaultTextState[`sync:${el.dataset.syncText}`] = el.innerHTML;
      }
      const synced = el.dataset.syncText ? textState[`sync:${el.dataset.syncText}`] : undefined;
      if(synced !== undefined) el.innerHTML = synced;
      else if(textState[el.dataset.editableId] !== undefined) el.innerHTML = textState[el.dataset.editableId];
      makeEditable(el);
    });

    function claimTextId(el, preferredId){
      const base = preferredId || nextTextId(el);
      let id = base;
      let suffix = 0;
      while(claimedTextIds.has(id)){
        suffix += 1;
        id = `${base}-${suffix}`;
      }
      claimedTextIds.add(id);
      return id;
    }
  }

  function resetTextCounters(root){
    let slides = root.classList?.contains('slide') ? [root] : [...(root.querySelectorAll?.('.slide') || [])];
    if(!slides.length){
      const slide = root.closest?.('.slide');
      if(slide) slides = [slide];
    }
    slides.forEach(slide => {
      const slideKey = getTextSlideKey(slide);
      const prefix = `text:${slideKey}:`;
      let max = 0;
      [
        ...(slide.dataset?.editableId ? [slide] : []),
        ...(slide.querySelectorAll?.('[data-editable-id]') || []),
      ].forEach(el => {
        const id = el.dataset.editableId || '';
        if(!id.startsWith(prefix)) return;
        const index = Number(id.slice(prefix.length));
        if(Number.isFinite(index) && index > max) max = index;
      });
      textCounters.set(slideKey, max);
    });
  }

  function makeEditable(el){
    el.dataset.editableReady = 'true';
  }

  function syncEditableMode(scope = deck, on){
    const root = scope instanceof Element ? scope : deck;
    const enabled = Boolean(on ?? canEditDeck()) && canEditDeck();
    const editable = [
      ...(root.dataset?.editableId ? [root] : []),
      ...(root.querySelectorAll?.('[data-editable-id]') || []),
    ];
    editable.forEach(el => {
      if(enabled){
        el.setAttribute('contenteditable', 'true');
        el.setAttribute('spellcheck', 'false');
        el.setAttribute('role', 'textbox');
      } else {
        el.removeAttribute('contenteditable');
        el.removeAttribute('spellcheck');
        el.removeAttribute('role');
      }
    });
  }

  function handleEditablePointerDown(e){
    if(!canEditDeck()) return;
    if(e.defaultPrevented || (e.button !== undefined && e.button !== 0)) return;
    const target = e.target instanceof Element ? e.target : null;
    if(!target || !deck.contains(target)) return;
    if(target.closest('button,input,textarea,select,a,#preview-panel,#preview-panel-collapse')) return;
    if(window.__isDeckFileSlotTarget?.(target)) return;
    if(target.closest('[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]')) return;
    const el = findEditableAtPoint(e.clientX, e.clientY);
    if(!el) return;
    e.preventDefault();
    e.stopPropagation();
    el.focus({preventScroll:true});
    placeCaretAtPoint(el, e.clientX, e.clientY);
  }

  function findEditableAtPoint(x, y){
    const activeSlide = deck.querySelector('.slide.active') || deck;
    const editable = [...activeSlide.querySelectorAll('[data-editable-id][contenteditable="true"]')]
      .filter(el => !window.__isDeckFileSlotTarget?.(el));
    for(let i = editable.length - 1; i >= 0; i--){
      const rects = editable[i].getClientRects();
      for(const rect of rects){
        if(x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) return editable[i];
      }
    }
    return null;
  }

  function placeCaretAtPoint(el, x, y){
    let range = document.caretRangeFromPoint?.(x, y);
    if(!range && document.caretPositionFromPoint){
      const pos = document.caretPositionFromPoint(x, y);
      if(pos){
        range = document.createRange();
        range.setStart(pos.offsetNode, pos.offset);
        range.collapse(true);
      }
    }
    if(!range || !el.contains(range.startContainer)){
      range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
    }
    const selection = getSelection();
    selection?.removeAllRanges();
    selection?.addRange(range);
  }

	  function handleFocusIn(e){
	    // 媒体槽子树里的 focus/input/blur(隐藏 file input 选图会触发 input+change)不是文案编辑;
	    // 若槽恰好嵌在一个可编辑文本块里(如引述页头像),把它当文本编辑会用陈旧 innerHTML 快照
	    // 覆写该块,连带摧毁 React 管理的槽 DOM(后续 reconcile 全部落空,媒体永远不显示)。
	    // 与 handleEditablePointerDown 用同一个 isDeckFileSlotTarget 判定。
	    if(window.__isDeckFileSlotTarget?.(e.target)) return;
	    const el = e.target.closest('[data-editable-id]');
	    if(!el || !deck.contains(el)) return;
	    if(!canEditDeck()){
	      el.blur();
	      return;
	    }
	    el.dataset.editing = 'true';
	    el.dataset.editBefore = el.innerHTML;
	  }

  function handleInput(e){
    if(window.__isDeckFileSlotTarget?.(e.target)) return;
    const el = e.target.closest('[data-editable-id]');
    if(!el || !deck.contains(el)) return;
    saveTextElement(el, {dirty:false});
  }

	  function handleBlur(e){
	    if(window.__isDeckFileSlotTarget?.(e.target)) return;
	    const el = e.target.closest('[data-editable-id]');
	    if(!el || !deck.contains(el)) return;
	    const before = el.dataset.editBefore;
	    const after = el.innerHTML;
      const changed = before !== undefined && before !== after;
	    delete el.dataset.editing;
	    delete el.dataset.editBefore;
	    saveTextElement(el, {dirty:changed});
	    if(changed && !window.__dashiUndo?.applying){
	      const key = el.dataset.editableId;
	      const syncName = el.dataset.syncText || '';
	      window.__dashiUndo?.push?.({
	        label: 'text',
	        undo: () => restoreTextElement(key, syncName, before),
	      });
	    }
	  }

  function saveTextElement(el, opts={}){
    if(!canEditDeck()) return;
    const key = el.dataset.editableId;
    if(!key) return;
    textState[key] = el.innerHTML;
    if(el.dataset.syncText) textState[`sync:${el.dataset.syncText}`] = el.innerHTML;
    if(opts.dirty) window.__markOverviewThumbDirty?.(el.closest('.slide'));
    writeTextState();
  }

  function flushTextState(scope){
    const roots = scope instanceof Element
      ? [scope]
      : (window.__getVisibleSlides?.() || [deck]);
    const seen = new Set();
    roots.forEach(root => {
      [
        ...(root.dataset?.editableId ? [root] : []),
        ...(root.querySelectorAll?.('[data-editable-id]') || []),
      ].forEach(el => {
        if(seen.has(el)) return;
        seen.add(el);
        saveTextElement(el);
      });
    });
    writeTextState();
  }

	  function restoreTextElement(key, syncName, value){
	    if(!key) return;
	    textState[key] = value;
	    if(syncName) textState[`sync:${syncName}`] = value;
	    deck.querySelectorAll('[data-editable-id]').forEach(el => {
	      if(el.dataset.editableId === key || (syncName && el.dataset.syncText === syncName)){
	        el.innerHTML = value;
	      }
	    });
	    writeTextState();
	  }

  function writeTextState(){
    if(stateEl) stateEl.textContent = JSON.stringify(textState).replace(/</g, '\\u003c');
    window.__deckViewModel?.setTextState?.(textState);
  }

  // JAD-173:没有显式 data-editable-path 时,用「从 slide 根到元素的 child-index 路径」生成稳定 ID,
  // 而非按 querySelectorAll 遍历顺序递增计数器。计数器在 prop 变更 reflow(候选元素集合变化)时整体
  // 漂移,使已存文案套到错误元素;结构路径只随该元素自身祖先结构变化,跨无关 reflow 稳定。
  function nextTextId(el){
    const slide = el.closest('.slide');
    const slideKey = getTextSlideKey(slide);
    const segments = [];
    let node = el;
    while(node && node !== slide && node.parentElement){
      segments.push([...node.parentElement.children].indexOf(node));
      node = node.parentElement;
    }
    segments.reverse();
    return `text:${slideKey}:p${segments.join('-')}`;
  }

  function explicitTextId(el){
    const path = el.dataset.editablePath;
    if(!path) return '';
    const slide = el.closest('.slide');
    const slideKey = getTextSlideKey(slide);
    return `text:${slideKey}:${path}`;
  }

  function getTextSlideKey(slide){
    return slide?.dataset.vmSlideKey || slide?.dataset.vmLayout || slide?.dataset.vmSlideId || 'deck';
  }

  function readTextState(){
    try {
      return JSON.parse(stateEl?.textContent || '{}') || {};
    } catch {
      return {};
    }
  }

  function isTextCandidate(el){
    if(!(el instanceof HTMLElement)) return false;
    if(el.hasAttribute('data-editable-skip')) return false;
    if(el.closest('[data-dashi-page-number]')) return false;
    if(el.parentElement?.closest('[data-editable-id]')) return false;
    if(window.__isDeckFileSlotTarget?.(el) || el.closest('#nav,#deck-page-pager,#preview-panel,#preview-panel-collapse')) return false;
    if(['SCRIPT','STYLE','CANVAS','SVG','PATH','BUTTON','INPUT','SELECT','TEXTAREA','VIDEO','IMG'].includes(el.tagName)) return false;
    if(!el.textContent?.trim()) return false;
    return [...el.children].every(child => ['BR','SPAN','B','I','EM','STRONG','SMALL'].includes(child.tagName));
  }
})();

		      slice.style.background = color;
		      if(config.orientation === 'vertical'){
		        slice.style.left = `${index * 100 / config.count}%`;
		        slice.style.width = `${100 / config.count + .18}%`;
		        slice.style.top = '0';
		        slice.style.height = '100%';
		      } else {
		        slice.style.top = `${index * 100 / config.count}%`;
		        slice.style.height = `${100 / config.count + .18}%`;
		        slice.style.left = '0';
		        slice.style.width = '100%';
		      }
		      grid.appendChild(slice);
		      slices.push(slice);
			    }
			    ctx.stage.appendChild(grid);
			    const showFrom = sliceOriginOffset(config.orientation, showOrigin);
			    const hideTo = sliceOriginOffset(config.orientation, hideOrigin);
			    const coverEndAt = config.showDuration + maxSliceStagger(config.count, config.stagger, ctx.direction, false);
			    const uncoverAt = coverEndAt + resolveNumber(config.uncoverGap, .02);
			    grid.dataset.sliceCoverEndAt = coverEndAt.toFixed(3);
			    grid.dataset.sliceUncoverStartAt = uncoverAt.toFixed(3);
		    return playTimeline(ctx, tl => {
		      gsap.set(ctx.current, {zIndex:1, autoAlpha:1, scale:1});
		      gsap.set(ctx.next, {zIndex:0, autoAlpha:1, scale:1, filter:'none'});
		      gsap.set(slices, {autoAlpha:1, xPercent:config.orientation === 'horizontal' ? showFrom : 0, yPercent:config.orientation === 'vertical' ? showFrom : 0});
		      tl.to(slices, {
		          xPercent:0,
		          yPercent:0,
			          duration:config.showDuration,
			          ease:'power4.inOut',
			          stagger:index => sliceStagger(index, config.count, config.stagger, ctx.direction, false),
			        }, 0)
		        .set(ctx.current, {autoAlpha:0}, coverEndAt)
		        .set(ctx.next, {zIndex:2}, coverEndAt)
		        .to(slices, {
		          xPercent:config.orientation === 'horizontal' ? hideTo : 0,
		          yPercent:config.orientation === 'vertical' ? hideTo : 0,
			          duration:config.hideDuration,
			          ease:'power4.inOut',
			          stagger:index => sliceStagger(index, config.count, config.stagger, ctx.direction, true),
			        }, uncoverAt)
		        .add(ctx.startTargetEnter, uncoverAt);
		    }, opts);
		  }
		  function playContainerMotion(ctx, opts, variant){
		    ctx.stage.dataset.transitionReference = 'blenkcode/codrops-demo';
		    ctx.stage.dataset.transitionVariant = variant;
		    const currentContainer = document.createElement('div');
		    const nextContainer = document.createElement('div');
		    currentContainer.className = 'page-transition-container';
		    nextContainer.className = 'page-transition-container';
		    currentContainer.dataset.containerRole = 'current';
		    nextContainer.dataset.containerRole = 'next';
			    currentContainer.dataset.containerTransition = 'true';
			    nextContainer.dataset.containerTransition = 'true';
			    currentContainer.dataset.containerVariant = variant;
			    nextContainer.dataset.containerVariant = variant;
			    currentContainer.appendChild(ctx.current);
			    nextContainer.appendChild(ctx.next);
			    ctx.stage.append(currentContainer, nextContainer);
			    return playTimeline(ctx, tl => {
			      if(variant === 'alternative-slide'){
			        const startSide = ctx.direction > 0 ? 'right' : 'left';
			        nextContainer.dataset.containerDirectionStart = startSide;
			        currentContainer.dataset.containerDirectionStart = startSide;
			        gsap.set(currentContainer, {zIndex:1, opacity:1, scale:1, x:'0%', force3D:true});
			        gsap.set(nextContainer, {zIndex:2, opacity:1, x:`${100 * ctx.direction}%`, force3D:true});
			        gsap.set(ctx.next, {autoAlpha:1});
			        tl.to(currentContainer, {x:`${-50 * ctx.direction}%`, scale:.8, duration:1.05, ease:'power4.inOut', force3D:true}, 0)
			          .to(currentContainer, {opacity:.38, duration:1.05, ease:'none'}, 0)
			          .to(nextContainer, {x:'0%', duration:1.05, ease:'power4.inOut', force3D:true}, 0)
			          .add(ctx.startTargetEnter, .5);
			        return;
			      }
			      const clipStart = ctx.direction > 0 ? 'top' : 'bottom';
			      const startClipPath = ctx.direction > 0 ? 'inset(100% 0% 0% 0%)' : 'inset(0% 0% 100% 0%)';
			      currentContainer.dataset.containerDirectionStart = ctx.direction > 0 ? 'up' : 'down';
			      nextContainer.dataset.containerDirectionStart = ctx.direction > 0 ? 'up' : 'down';
			      currentContainer.dataset.containerClipStart = clipStart;
			      nextContainer.dataset.containerClipStart = clipStart;
			      gsap.set(currentContainer, {zIndex:1, opacity:1, scale:1, y:'0%', force3D:true});
			      gsap.set(nextContainer, {zIndex:2, opacity:1, clipPath:startClipPath, force3D:true});
			      gsap.set(ctx.next, {autoAlpha:1, scale:1.04});
			      tl.to(currentContainer, {y:`${-30 * ctx.direction}%`, scale:.8, opacity:.4, duration:.86, ease:'power4.inOut', force3D:true}, 0)
			        .to(nextContainer, {clipPath:'inset(0% 0% 0% 0%)', duration:.86, ease:'power4.inOut', force3D:true}, 0)
		        .to(ctx.next, {scale:1, duration:.86, ease:'power3.out'}, 0)
		        .add(ctx.startTargetEnter, .42);
		    }, opts);
		  }
		  function pixelScaleVars(axis, from, to){
		    if(axis === 'scaleX') return {scaleX:to, scaleY:1};
		    if(axis === 'scaleY') return {scaleY:to, scaleX:1};
		    return {scale:to};
		  }
		  function resolveConfigValue(value, ctx){
		    return typeof value === 'function' ? value(ctx) : value;
		  }
		  function resolveNumber(value, fallback){
		    return value == null ? fallback : value;
		  }
		  function transitionBlockColor(mode, fallback){
		    const color = window.__getPageTransitionColor?.(mode) || fallback || '#000000';
		    return /^#[0-9a-f]{6}$/i.test(color) ? color : fallback || '#000000';
		  }
		  function firstPixelIndex(cells, rows, cols, mode, direction){
		    let bestIndex = 0;
		    let bestValue = Infinity;
		    cells.forEach((cell, index) => {
		      const row = Number(cell.dataset.pixelRow || 0);
		      const col = Number(cell.dataset.pixelColumn || 0);
		      const value = pixelOrderBase(row, col, rows, cols, mode, direction);
		      if(value < bestValue){
		        bestValue = value;
		        bestIndex = index;
		      }
		    });
		    return bestIndex;
		  }
		  function maxPixelStagger(cells, rows, cols, mode, direction, reverse){
		    return cells.reduce((max, cell, index) => Math.max(max, pixelStagger(index, cells, rows, cols, mode, direction, reverse)), 0);
		  }
		  function pixelStagger(index, cells, rows, cols, mode, direction, reverse){
		    const cell = cells[index];
		    const row = Number(cell.dataset.pixelRow || 0);
		    const col = Number(cell.dataset.pixelColumn || 0);
		    let base = pixelOrderBase(row, col, rows, cols, mode, direction);
		    if(mode === 'row-random') base += ((row * 17 + col * 13) % 6) * .8;
		    if(reverse) base = rows + cols - base;
		    const factor = mode === 'center-fast' ? .008 : .012;
		    return Math.max(0, base * factor);
		  }
		  function pixelOrderBase(row, col, rows, cols, mode, direction){
		    let base = row + col * .3;
		    if(mode === 'center' || mode === 'center-fast'){
		      base = Math.abs(row - (rows - 1) / 2) + Math.abs(col - (cols - 1) / 2);
		      if(direction < 0) base = rows + cols - base;
		    } else if(mode === 'rows'){
		      base = direction > 0 ? row : rows - row - 1;
		    } else if(mode === 'columns'){
		      base = direction > 0 ? col : cols - col - 1;
		    } else if(mode === 'row-random'){
		      base = direction > 0 ? row : rows - row - 1;
		    }
		    return base;
		  }
		  function sliceOriginForDirection(orientation, origin, direction){
		    if(direction > 0) return origin;
		    if(orientation === 'vertical') return origin === 'top' ? 'bottom' : 'top';
		    return origin === 'left' ? 'right' : 'left';
		  }
		  function sliceOriginOffset(orientation, origin){
		    if(orientation === 'vertical') return origin === 'top' ? -105 : 105;
		    return origin === 'left' ? -105 : 105;
		  }
		  function firstSliceIndex(count, mode, direction){
		    let bestIndex = 0;
		    let bestValue = Infinity;
		    for(let index=0; index<count; index+=1){
		      const value = sliceOrderBase(index, count, mode, direction);
		      if(value < bestValue){
		        bestValue = value;
		        bestIndex = index;
		      }
		    }
		    return bestIndex;
		  }
		  function maxSliceStagger(count, mode, direction, reverse){
		    let max = 0;
		    for(let index=0; index<count; index+=1) max = Math.max(max, sliceStagger(index, count, mode, direction, reverse));
		    return max;
		  }
		  function sliceStagger(index, count, mode, direction, reverse){
		    let order = sliceOrderBase(index, count, mode, direction);
		    if(reverse) order = count - order - 1;
		    return Math.max(0, order * .045);
		  }
		  function sliceOrderBase(index, count, mode, direction){
		    if(mode === 'center'){
		      const distance = Math.abs((count - 1) / 2 - index);
		      return direction > 0 ? distance : count / 2 - distance;
		    }
		    return direction > 0 ? index : count - index - 1;
		  }
})();
</script>
<script>
/* =============== Quiet topbar · 语言切换 =============== */
(function(){
  const btn=document.getElementById('preview-lang-toggle');
  const i18n=window.__deckI18n;
  if(!btn||!i18n) return;
  // 按钮显示目标语言(点击后切到的那种),title 用目标语言书写给目标用户看。
  btn.textContent=i18n.isEn?'中':'EN';
  const hint=i18n.isEn?'切换到中文':'Switch to English';
  btn.setAttribute('title',hint);
  btn.setAttribute('aria-label',hint);
  btn.addEventListener('click',()=>i18n.setLanguage(i18n.isEn?'zh':'en'));
})();
</script>
<script>
/* =============== Quiet topbar · 明暗切换 =============== */
(function(){
  const btn=document.getElementById('preview-theme-toggle');
  if(!btn) return;
  const KEY='dashi-pp-chrome-theme';
  const SUN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  const MOON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  const systemDark=()=>matchMedia('(prefers-color-scheme:dark)').matches;
  const current=()=>{const a=document.documentElement.getAttribute('data-pp-theme');return a==='dark'||a==='light'?a:(systemDark()?'dark':'light');};
  function paintIcon(theme){btn.innerHTML=theme==='dark'?SUN:MOON;btn.setAttribute('title',window.__deckI18n.ui(theme==='dark'?'切换到明亮':'切换到暗色'));}
  function apply(theme){document.documentElement.setAttribute('data-pp-theme',theme);paintIcon(theme);try{localStorage.setItem(KEY,theme);}catch{}}
  let saved;try{saved=localStorage.getItem(KEY);}catch{}
  if(saved==='dark'||saved==='light') apply(saved); else paintIcon(current());
  btn.addEventListener('click',()=>apply(current()==='dark'?'light':'dark'));
})();
</script>
