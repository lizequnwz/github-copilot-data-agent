version: 0.2.0.dev0
semantic_model:
  - name: demo_sales
    description: Synthetic sales model used by the offline walkthrough.
    ai_context:
      instructions: Use only for the local example; the values are synthetic.
      synonyms: [sales demo]
    datasets:
      - name: orders
        source: DEMO.ANALYTICS.ORDERS
        primary_key: [order_id]
        description: One synthetic row per order.
        fields:
          - name: order_date
            expression:
              dialects:
                - dialect: SNOWFLAKE
                  expression: orders.order_date
            dimension: {is_time: true}
            description: Order creation date.
          - name: region
            expression:
              dialects:
                - dialect: SNOWFLAKE
                  expression: orders.region
            dimension: {}
            ai_context: {synonyms: [geography, territory]}
    metrics:
      - name: gross_sales
        expression:
          dialects:
            - dialect: SNOWFLAKE
              expression: SUM(orders.gross_sales_amount)
        description: Sum of synthetic gross sales amount before returns.
        ai_context: {synonyms: [revenue, sales]}
