# Copy this file to snowflake_config.yaml and fill in the non-secret connection context.
# Use externalbrowser for SAML/browser SSO or oauth with a token environment variable.
# Never add passwords or literal tokens to this file.
snowflake:
  account: "REPLACE_WITH_ORG_ACCOUNT"
  user: "REPLACE_WITH_USERNAME"
  authenticator: "externalbrowser"
  # For authenticator: oauth, export this variable before connecting.
  oauth_token_env: "SNOWFLAKE_OAUTH_TOKEN"
  # Optional preferred session context. Omit values to use Snowflake defaults.
  role: "DATA_AGENT_READONLY"
  warehouse: "DATA_AGENT_WH"
  database: "REPLACE_WITH_DATABASE"
  schema: "REPLACE_WITH_SCHEMA"
  query_tag: "copilot_data_agent"

limits:
  max_rows: 5000
  max_result_bytes: 5000000
  timeout_seconds: 60

access:
  blocked_schemas:
    - "SNOWFLAKE.ACCOUNT_USAGE"
    - "RAW_PII"
  # Ad hoc text-to-SQL may use promoted model sources plus these explicit objects.
  # Use fully qualified DATABASE.SCHEMA.OBJECT names.
  allowed_objects: []
  allow_sensitive_sampling: false
